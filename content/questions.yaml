- question_id: Q-PAY-046
  type: MCQ
  pillar: payor
  tutorial_id: T-PAYOR-01
  question: What does the Federal Medical Assistance Percentage (FMAP) determine?
  options:
    A: The percentage of Medicare Part B premiums paid by the government
    B: The federal government's share of Medicaid costs in each state
    C: The maximum number of Medicaid beneficiaries per state
    D: The interest rate on medical debt
  correct_answer: B
  explanation_correct: The FMAP determines the federal share of Medicaid funding for each state, which varies based on per
    capita income.
  explanation_incorrect:
    A: The FMAP applies to Medicaid funding, not Medicare Part B premiums.
    C: The FMAP sets the funding share, not enrollment caps.
    D: The FMAP has nothing to do with medical debt interest rates.
