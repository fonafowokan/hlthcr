- question_id: Q-PRV-040
  type: MCQ
  pillar: provider
  tutorial_id: T-PROVIDER-01
  question: Which of the following is NOT one of the criteria for equipment to qualify as Durable Medical Equipment?
  options:
    A: It can withstand repeated use
    B: It has an expected life of at least three years
    C: It must be prescribed by a specialist physician
    D: It is appropriate for use in the patient's home
  correct_answer: C
  explanation_correct: DME must withstand repeated use, have a life of at least three years, serve a medical purpose, not
    be useful without illness or injury, and be appropriate for home use. There is no requirement that it be prescribed by
    a specialist.
  explanation_incorrect:
    A: Withstanding repeated use is one of the standard criteria for DME.
    B: An expected life of at least three years is one of the standard criteria for DME.
    D: Home appropriateness is one of the standard criteria for DME.
