  type: MCQ
  pillar: payor
  tutorial_id: T-PAYOR-01
  question: In coordination of benefits, what is the payor that pays first called?
  options:
    A: The secondary payer
    B: The copayer
    C: The primary payer
    D: The supplemental payer
  correct_answer: C
  explanation_correct: When a patient has more than one insurance, coordination of benefits rules determine which payor pays
    first, and that payor is called the primary payer.
  explanation_incorrect:
    A: The secondary payer is the one that pays after the primary payer, not before.
    B: Copayer is not a standard term in coordination of benefits.
    D: Supplemental payer is not the standard term for the first payer in coordination of benefits.
