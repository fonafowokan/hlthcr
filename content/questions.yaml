    B: Individual states administer their own Medicaid programs according to federal requirements
    C: Private insurance companies administer Medicaid in every state
    D: The Social Security Administration runs Medicaid
  correct_answer: B
  explanation_correct: Medicaid is administered by individual states according to federal requirements, which is why eligibility
    and services can vary from state to state.
  explanation_incorrect:
    A: CMS provides oversight and federal requirements, but states administer their own programs.
    C: While states may contract with managed care organizations, the state government administers the program.
