    B: An online provider enrollment system
    C: A quality rating program for nursing homes
    D: A prescription drug monitoring database
  correct_answer: B
  explanation_correct: To enroll in Medicare, a provider completes an application through PECOS, the online enrollment system.
  explanation_incorrect:
    A: PECOS is an enrollment system, not a claims payment system.
