    B: A hospital bed for home use
    C: A bottle of prescription medication
    D: A bandage applied in a clinic
  correct_answer: B
  explanation_correct: Examples of DME include hospital beds, wheelchairs, ventilators, oxygen equipment, prosthetics, and
    orthotics.
  explanation_incorrect:
    A: A stethoscope is a tool used by a clinician during care delivery, not equipment prescribed for the patient.
