    plan. Employment at the same company is not required.
  explanation_incorrect: Dependents receive coverage through the subscriber's plan based on their family relationship, not
    their employment status.
  fact_id: FACT-PAT-002
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-018
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Under the ACA, a child's marital status does not affect their ability to stay on a parent's health plan until
    age 26.
  correct_answer: 'True'
  explanation_correct: The ACA requires health plans to allow children to remain on a parent's plan until age 26 regardless
    of marital status.
  explanation_incorrect: This statement is true. The ACA provision applies regardless of whether the child is married.
  fact_id: FACT-PAT-003
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-019
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Outside of Open Enrollment, a person can enroll in a Marketplace plan at any time for any reason.
  correct_answer: 'False'
  explanation_correct: Outside of Open Enrollment, a person can only enroll in or change a Marketplace plan if they experience
    a qualifying life event that triggers a Special Enrollment Period.
  explanation_incorrect: Marketplace enrollment outside Open Enrollment requires a qualifying life event such as losing coverage,
    getting married, or having a baby.
  fact_id: FACT-PAT-004
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-020
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Most Special Enrollment Periods give a person 60 days to select a new health plan after a qualifying life event.
  correct_answer: 'True'
  explanation_correct: Most SEPs provide a 60-day window before or after the qualifying life event to enroll in or change
    a health plan.
  explanation_incorrect: This statement is true. The standard SEP window is 60 days around the qualifying life event.
  fact_id: FACT-PAT-006
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-021
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A provider may charge a patient a fee for searching for and retrieving their health records.
  correct_answer: 'False'
  explanation_correct: A provider may charge a reasonable fee for copying and mailing health records, but cannot charge for
    searching for or retrieving them.
  explanation_incorrect: Under HIPAA, providers cannot charge for the search-and-retrieval effort. Fees may only cover copying
    and mailing costs.
  fact_id: FACT-PAT-011
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-022
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A patient can direct a covered entity to send their health information to a third party, such as another doctor.
  correct_answer: 'True'
  explanation_correct: Under HIPAA, patients have the right to direct a covered entity to send a copy of their health information
    to a designated third party.
  explanation_incorrect: This statement is true. Patients may request that their records be sent to another provider, a family
    member, or another party of their choice.
  fact_id: FACT-PAT-012
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-023
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: The Notice of Privacy Practices is a bill sent to the patient after each doctor visit.
  correct_answer: 'False'
  explanation_correct: The Notice of Privacy Practices is a plain-language document explaining how a covered entity may use
    and disclose the patient's health information. It is not a bill.
  explanation_incorrect: The Notice of Privacy Practices is a HIPAA-required document about information use and disclosure,
    not a billing document.
  fact_id: FACT-PAT-014
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-024
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: For children who cannot consent on their own, a parent or legal guardian provides informed consent for medical
    treatment.
  correct_answer: 'True'
  explanation_correct: Competent adults consent for themselves, while a parent or legal guardian provides informed consent
    on behalf of a child.
  explanation_incorrect: This statement is true. Minors generally cannot give their own informed consent, so a parent or legal
    guardian acts on their behalf.
  fact_id: FACT-PAT-016
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-025
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A deductible is a fixed dollar amount paid at the time of each doctor visit.
  correct_answer: 'False'
  explanation_correct: A fixed dollar amount paid at the time of a visit is a copayment. A deductible is the total amount
    a patient must pay out of pocket each year before the plan begins to pay its share.
  explanation_incorrect: The description matches a copayment. A deductible is an annual threshold the patient must reach before
    the plan starts sharing costs.
  fact_id: FACT-PAT-019
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-026
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Premiums must be paid regardless of whether the patient uses any medical services during that period.
  correct_answer: 'True'
  explanation_correct: A premium is paid — usually monthly — to maintain health insurance coverage, whether or not the patient
    sees a doctor or uses any services.
  explanation_incorrect: This statement is true. Premiums keep the insurance policy active and are due regardless of healthcare
    utilization.
  fact_id: FACT-PAT-018
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-027
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: After reaching the out-of-pocket maximum, the patient continues to pay coinsurance for covered services.
  correct_answer: 'False'
  explanation_correct: Once the out-of-pocket maximum is reached, the health plan pays 100% of covered costs for the remainder
    of the plan year. The patient no longer pays coinsurance, copays, or deductible amounts.
  explanation_incorrect: After the out-of-pocket maximum is met, the plan covers 100% of remaining covered costs for that
    year.
  fact_id: FACT-PAT-022
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-028
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Patients should compare their Explanation of Benefits with the provider's bill before making a payment.
  correct_answer: 'True'
  explanation_correct: Patients should compare the EOB from their health plan with the bill from the provider to confirm that
    services and amounts match before paying.
  explanation_incorrect: This statement is true. Comparing the EOB with the provider bill helps patients catch errors and
    verify they are being charged correctly.
  fact_id: FACT-PAT-024
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-029
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Higher patient activation is associated with better health outcomes and lower costs.
  correct_answer: 'True'
  explanation_correct: Research shows that patients who are more knowledgeable, skilled, and confident in managing their care
    tend to have better outcomes and incur lower healthcare costs.
  explanation_incorrect: This statement is true. Patient activation — having the knowledge and confidence to participate in
    care — is linked to improved outcomes and cost savings.
  fact_id: FACT-PAT-025
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-030
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Eligibility for employer-sponsored health insurance and Marketplace coverage is determined by the same set of
    rules.
  correct_answer: 'False'
  explanation_correct: Employer-sponsored coverage eligibility is determined by the employer's plan rules, while Marketplace
    eligibility depends on factors such as income, household size, and residency.
  explanation_incorrect: The two pathways use different criteria. Employer plans follow the employer's rules; Marketplace
    plans consider income, household size, and residency.
  fact_id: FACT-PAT-007
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-031
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Under HIPAA, patients have a legal, enforceable right to access their protected health information held by covered
    entities.
  correct_answer: 'True'
  explanation_correct: The HIPAA Privacy Rule gives patients a legal and enforceable right to access and obtain copies of
    their PHI from covered entities such as doctors, hospitals, and health plans.
  explanation_incorrect: This statement is true. HIPAA establishes patient access to their own health records as a legal right,
    not merely a courtesy.
  fact_id: FACT-PAT-008
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-032
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Any adult, regardless of mental competency, can give valid informed consent for medical treatment.
  correct_answer: 'False'
  explanation_correct: Only competent adults — those who can understand the information and make a voluntary decision — can
    give valid informed consent. Adults who lack competency rely on an authorized decision-maker.
  explanation_incorrect: Informed consent requires that the adult is competent, meaning they can understand the information
    and decide voluntarily. Not every adult meets this standard.
  fact_id: FACT-PAT-016
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-033
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A copayment amount varies based on the total cost of the medical service.
  correct_answer: 'False'
  explanation_correct: A copayment is a fixed dollar amount — for example $25 — that does not change based on the total cost
    of the service. The amount that varies with service cost is coinsurance.
  explanation_incorrect: Copayments are fixed amounts set by the plan. Cost-sharing that varies with the service price is
    called coinsurance.
  fact_id: FACT-PAT-020
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-034
  type: TF
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Having a baby is a qualifying life event that can trigger a Special Enrollment Period.
  correct_answer: 'True'
  explanation_correct: Having a baby is one of the qualifying life events — along with getting married, losing coverage, or
    moving — that triggers a Special Enrollment Period.
  explanation_incorrect: This statement is true. The birth of a child qualifies a person for a Special Enrollment Period to
    enroll in or change their health plan.
  fact_id: FACT-PAT-005
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-035
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which term best describes a spouse or child covered under someone else's health insurance plan?
  options:
    A: Subscriber
    B: Policyholder
    C: Dependent
    D: Beneficiary
  correct_answer: C
  explanation_correct: A dependent is a family member — such as a spouse, child, or domestic partner — who is covered under
    the subscriber's plan.
  explanation_incorrect:
    A: The subscriber is the person who holds the insurance contract, not the person covered under it.
    B: Policyholder is another term for the subscriber, not for family members on the plan.
    D: Beneficiary is a general insurance term; in health insurance, the correct term is dependent.
  fact_id: FACT-PAT-002
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-036
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Until what age can children remain on a parent's health plan under the Affordable Care Act?
  options:
    A: 21
    B: 24
    C: 26
    D: 30
  correct_answer: C
  explanation_correct: The ACA requires health plans that offer dependent coverage to allow children to stay on a parent's
    plan until age 26.
  explanation_incorrect:
    A: Age 21 was a common cutoff before the ACA, but the law extended it to 26.
    B: Age 24 is not the correct threshold under the ACA.
    D: Age 30 exceeds the ACA requirement, which sets the limit at 26.
  fact_id: FACT-PAT-003
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-037
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following is NOT a qualifying life event for a Special Enrollment Period?
  options:
    A: Losing existing health coverage
    B: Moving to a new state
    C: Receiving a promotion at work
    D: Having a baby
  correct_answer: C
  explanation_correct: A promotion does not change coverage status and is not a qualifying life event. Losing coverage, moving,
    and having a baby are all qualifying life events.
  explanation_incorrect:
    A: Losing health coverage is a qualifying life event that triggers a Special Enrollment Period.
    B: Moving to a new coverage area is a qualifying life event.
    D: Having a baby is a qualifying life event.
  fact_id: FACT-PAT-005
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-038
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: How many days do most Special Enrollment Periods give a person to select a new health plan?
  options:
    A: 30 days
    B: 45 days
    C: 60 days
    D: 90 days
  correct_answer: C
  explanation_correct: Most Special Enrollment Periods provide a 60-day window before or after the qualifying life event to
    select a new health plan.
  explanation_incorrect:
    A: 30 days is the HIPAA response deadline for records requests, not the SEP window.
    B: 45 days is not the standard SEP window.
    D: 90 days exceeds the standard 60-day SEP window.
  fact_id: FACT-PAT-006
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-039
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Marketplace plan eligibility depends on which of the following factors?
  options:
    A: The applicant's job title and years of experience
    B: Income, household size, and residency
    C: The applicant's credit score
    D: The applicant's medical history
  correct_answer: B
  explanation_correct: Marketplace eligibility is determined by factors such as income, household size, and state residency.
  explanation_incorrect:
    A: Job title and experience are not factors in Marketplace eligibility.
    C: Credit score has no bearing on health insurance Marketplace eligibility.
    D: Under the ACA, medical history cannot be used to determine eligibility for Marketplace plans.
  fact_id: FACT-PAT-007
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-040
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following is a covered entity required to provide patients access to under HIPAA?
  options:
    A: The provider's financial statements
    B: Other patients' health records
    C: The patient's own protected health information
    D: The provider's internal staffing schedules
  correct_answer: C
  explanation_correct: Under HIPAA, covered entities must provide patients with access to their own protected health information.
  explanation_incorrect:
    A: Provider financial statements are not part of the patient's PHI.
    B: Sharing other patients' records would violate HIPAA privacy protections.
    D: Staffing schedules are internal business records, not patient health information.
  fact_id: FACT-PAT-008
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-041
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Within how many days must a covered entity respond to a patient's request to access their health records?
  options:
    A: 7 days
    B: 14 days
    C: 30 days
    D: 60 days
  correct_answer: C
  explanation_correct: HIPAA requires a covered entity to respond to a patient's access request within 30 days of receiving
    it.
  explanation_incorrect:
    A: 7 days is too short; HIPAA allows up to 30 days.
    B: 14 days is not the HIPAA-required timeframe.
    D: 60 days is the SEP enrollment window, not the records access deadline.
  fact_id: FACT-PAT-009
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-042
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: When a patient believes information in their health record is inaccurate, what HIPAA right can they exercise?
  options:
    A: Right to delete all records
    B: Right to amendment
    C: Right to transfer their provider license
    D: Right to waive all future treatment
  correct_answer: B
  explanation_correct: Patients have the right to request amendments — corrections — to their health records if they believe
    the information is inaccurate or incomplete.
  explanation_incorrect:
    A: HIPAA does not give patients a blanket right to delete all records.
    C: Provider licensing is unrelated to patient record rights.
    D: Waiving future treatment is not a HIPAA records right.
  fact_id: FACT-PAT-010
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-043
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A provider may charge a reasonable fee for which of the following when a patient requests their records?
  options:
    A: Searching for the records
    B: Retrieving the records from storage
    C: Copying and mailing the records
    D: Locating the records in the system
  correct_answer: C
  explanation_correct: Providers may charge a reasonable fee for copying and mailing health records but cannot charge for
    the search-and-retrieval effort.
  explanation_incorrect:
    A: HIPAA prohibits charging for searching for records.
    B: Retrieval costs cannot be passed to the patient under HIPAA.
    D: Locating records is part of the search process, which cannot be charged.
  fact_id: FACT-PAT-011
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-044
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A patient wants their medical records sent to a new specialist. Under HIPAA, what can the patient do?
  options:
    A: Nothing — only the original provider can decide where records go
    B: Direct the covered entity to send a copy to the specialist
    C: File a lawsuit to obtain the records
    D: Ask the insurance company to transfer the records automatically
  correct_answer: B
  explanation_correct: Patients can direct a covered entity to send a copy of their health information to a third party of
    their choice, such as another doctor.
  explanation_incorrect:
    A: Patients have the right to direct where their records are sent.
    C: A lawsuit is not required; HIPAA provides this right directly.
    D: The request goes to the covered entity holding the records, not the insurance company.
  fact_id: FACT-PAT-012
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-045
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Where can a patient file a complaint if they believe their HIPAA privacy rights have been violated?
  options:
    A: The local courthouse
    B: The Federal Reserve Board
    C: The U.S. Department of Health and Human Services (HHS)
    D: The Internal Revenue Service (IRS)
  correct_answer: C
  explanation_correct: Patients may file a complaint with HHS if they believe a covered entity has violated their HIPAA privacy
    rights.
  explanation_incorrect:
    A: HIPAA complaints are handled by HHS, not the local court system.
    B: The Federal Reserve Board oversees banking, not health privacy.
    D: The IRS handles tax matters, not HIPAA enforcement.
  fact_id: FACT-PAT-013
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-046
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What does the Notice of Privacy Practices explain to a patient?
  options:
    A: The total cost of upcoming medical procedures
    B: How the covered entity may use and disclose the patient's health information
    C: The patient's remaining deductible balance
    D: The provider's malpractice insurance coverage
  correct_answer: B
  explanation_correct: The Notice of Privacy Practices is a plain-language document explaining how the entity may use and
    disclose the patient's health information.
  explanation_incorrect:
    A: Procedure costs are discussed separately and are not part of the Notice of Privacy Practices.
    C: Deductible balances appear on insurance statements, not in the Notice of Privacy Practices.
    D: Malpractice coverage is unrelated to privacy practices.
  fact_id: FACT-PAT-014
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-047
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Who is required to give patients a Notice of Privacy Practices?
  options:
    A: Only hospitals
    B: Only pharmacies
    C: Health care providers and health plans
    D: Only government agencies
  correct_answer: C
  explanation_correct: The HIPAA Privacy Rule requires health care providers and health plans to give patients a Notice of
    Privacy Practices.
  explanation_incorrect:
    A: The requirement applies to all covered health care providers, not just hospitals.
    B: Pharmacies are included, but they are not the only covered entities required to provide the notice.
    D: The requirement applies to covered entities in both the public and private sectors.
  fact_id: FACT-PAT-014
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-048
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following must a clinician explain during the informed consent process?
  options:
    A: The patient's insurance deductible amount
    B: The risks, benefits, and alternatives of the proposed treatment
    C: The provider's personal medical history
    D: The hospital's visiting hours
  correct_answer: B
  explanation_correct: Informed consent requires the clinician to explain the risks, benefits, and alternatives of a proposed
    procedure or treatment.
  explanation_incorrect:
    A: Insurance details are not part of the informed consent discussion.
    C: The provider's personal health is irrelevant to informed consent.
    D: Visiting hours are an administrative matter, not part of informed consent.
  fact_id: FACT-PAT-015
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-049
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: In which situation may informed consent be waived?
  options:
    A: When the patient is in a hurry to leave the hospital
    B: When the procedure is minor and low-risk
    C: When there is a life-threatening emergency and no authorized decision-maker is available
    D: When the provider has performed the procedure many times before
  correct_answer: C
  explanation_correct: Informed consent may be waived in life-threatening emergencies when there is not enough time to obtain
    consent and no authorized decision-maker is available.
  explanation_incorrect:
    A: A patient's schedule does not justify waiving informed consent.
    B: Even minor procedures generally require some form of consent.
    D: The provider's experience level does not waive the consent requirement.
  fact_id: FACT-PAT-017
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-050
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Who provides informed consent for a minor's medical treatment?
  options:
    A: The minor themselves
    B: A parent or legal guardian
    C: The insurance company
    D: The hospital administrator
  correct_answer: B
  explanation_correct: For children, a parent or legal guardian provides informed consent on their behalf.
  explanation_incorrect:
    A: Minors generally cannot provide their own informed consent.
    C: Insurance companies do not provide medical consent for patients.
    D: Hospital administrators do not consent on behalf of patients.
  fact_id: FACT-PAT-016
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-051
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What is a deductible in health insurance?
  options:
    A: The monthly payment to keep the insurance policy active
    B: A fixed dollar amount paid at each doctor visit
    C: The amount a patient must pay out of pocket each year before the plan begins to pay its share
    D: The percentage of costs the patient pays after meeting a threshold
  correct_answer: C
  explanation_correct: A deductible is the annual amount a patient must pay out of pocket for covered services before the
    insurance plan begins to pay.
  explanation_incorrect:
    A: The monthly payment is the premium, not the deductible.
    B: A fixed amount per visit is a copayment.
    D: A percentage share of costs is coinsurance.
  fact_id: FACT-PAT-019
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-052
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A patient pays a flat $30 each time they visit a doctor. What is this payment called?
  options:
    A: Premium
    B: Deductible
    C: Copayment
    D: Coinsurance
  correct_answer: C
  explanation_correct: A copayment (copay) is a fixed dollar amount a patient pays for a covered service at the time of the
    visit.
  explanation_incorrect:
    A: A premium is the monthly cost of maintaining coverage, not a per-visit charge.
    B: A deductible is an annual out-of-pocket threshold, not a per-visit flat fee.
    D: Coinsurance is a percentage of costs, not a flat dollar amount.
  fact_id: FACT-PAT-020
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-053
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: After meeting the deductible, a patient pays 30% and the plan pays 70% of covered service costs. What is the patient's
    30% share called?
  options:
    A: Copayment
    B: Premium
    C: Coinsurance
    D: Out-of-pocket maximum
  correct_answer: C
  explanation_correct: Coinsurance is the percentage of a covered service's cost that the patient pays after meeting the deductible.
  explanation_incorrect:
    A: A copayment is a fixed dollar amount, not a percentage.
    B: A premium is the monthly payment for coverage, not a cost-sharing percentage.
    D: The out-of-pocket maximum is the annual cap on patient spending, not a percentage share.
  fact_id: FACT-PAT-021
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-054
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What is the out-of-pocket maximum?
  options:
    A: The most a provider can charge for a single service
    B: The most a patient will pay for covered services in a plan year before the plan pays 100%
    C: The total amount the insurance company pays over a patient's lifetime
    D: The maximum premium a plan can charge per month
  correct_answer: B
  explanation_correct: The out-of-pocket maximum is the most a patient will pay for covered services in a plan year; once
    reached, the health plan pays 100% of covered costs.
  explanation_incorrect:
    A: Provider charges are separate from the patient's out-of-pocket maximum.
    C: Lifetime maximums are a different concept and were largely eliminated by the ACA.
    D: Premium limits are unrelated to the out-of-pocket maximum.
  fact_id: FACT-PAT-022
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-055
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What does an Explanation of Benefits (EOB) show?
  options:
    A: The patient's credit score and payment history
    B: What was billed, what the plan paid, and what the patient owes
    C: The provider's internal cost of delivering care
    D: The patient's complete medical history
  correct_answer: B
  explanation_correct: An EOB is a summary from the health plan showing what was billed, what the plan paid, and what the
    patient may owe.
  explanation_incorrect:
    A: Credit scores are not included in an EOB.
    C: Internal provider costs are not disclosed on an EOB.
    D: An EOB is a financial document, not a medical record.
  fact_id: FACT-PAT-023
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-056
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Why should a patient compare their EOB with the provider's bill?
  options:
    A: To verify that the provider is board-certified
    B: To confirm that services and amounts match before making a payment
    C: To check the insurance company's financial rating
    D: To see which medications are on the formulary
  correct_answer: B
  explanation_correct: Patients should compare the EOB with the provider bill to confirm that services and amounts match and
    to catch any billing errors.
  explanation_incorrect:
    A: Board certification is verified through medical boards, not billing documents.
    C: Insurance company ratings are not shown on EOBs or provider bills.
    D: Formulary information is separate from billing statements.
  fact_id: FACT-PAT-024
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-057
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What does patient engagement refer to?
  options:
    A: The number of times a patient visits the emergency room
    B: A patient's knowledge, skills, and confidence to actively participate in their own health care
    C: The provider's effort to market services to patients
    D: The length of time a patient has been enrolled in a plan
  correct_answer: B
  explanation_correct: Patient engagement refers to a patient's knowledge, skills, and confidence to actively participate
    in their own health care decisions.
  explanation_incorrect:
    A: ER visit frequency is a utilization metric, not a measure of engagement.
    C: Marketing efforts are provider activities, not a patient characteristic.
    D: Enrollment duration is unrelated to a patient's active participation in their care.
  fact_id: FACT-PAT-025
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-058
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following best describes the relationship between a subscriber and a dependent?
  options:
    A: The subscriber works for the dependent's employer
    B: The subscriber holds the insurance contract and the dependent is a covered family member
    C: The dependent selects the insurance plan and the subscriber pays for it
    D: The subscriber and dependent must live at the same address
  correct_answer: B
  explanation_correct: The subscriber is the primary individual who holds the insurance contract, and the dependent is a family
    member covered under that contract.
  explanation_incorrect:
    A: The subscriber's employment relationship is with their own employer, not the dependent's.
    C: The subscriber, not the dependent, selects and holds the plan.
    D: Living at the same address is not a universal requirement for dependent status.
  fact_id: FACT-PAT-001
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-059
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following people can be a dependent on a subscriber's health plan?
  options:
    A: The subscriber's coworker
    B: The subscriber's neighbor
    C: The subscriber's spouse
    D: The subscriber's insurance agent
  correct_answer: C
  explanation_correct: A dependent is a family member — such as a spouse, child, or domestic partner — who is covered under
    the subscriber's plan.
  explanation_incorrect:
    A: Coworkers are not family members and cannot be dependents on a personal plan.
    B: Neighbors do not qualify as dependents.
    D: An insurance agent is a business contact, not a dependent.
  fact_id: FACT-PAT-002
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-060
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What is Open Enrollment?
  options:
    A: A penalty-free period after missing a premium payment
    B: The annual period when anyone can enroll in, renew, or change a Marketplace plan
    C: A one-time enrollment opportunity available only to new employees
    D: A government program that automatically enrolls uninsured citizens
  correct_answer: B
  explanation_correct: Open Enrollment is the annual period when anyone can enroll in, renew, or change a Health Insurance
    Marketplace plan.
  explanation_incorrect:
    A: A grace period for missed premiums is different from Open Enrollment.
    C: New employee enrollment is part of employer-sponsored plans, not the Marketplace Open Enrollment period.
    D: The Marketplace does not automatically enroll individuals.
  fact_id: FACT-PAT-004
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-061
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A person loses their employer-sponsored health insurance. What enrollment opportunity becomes available?
  options:
    A: Open Enrollment begins immediately
    B: A Special Enrollment Period triggered by the qualifying life event
    C: Automatic enrollment in Medicaid
    D: A one-year waiting period before any new enrollment
  correct_answer: B
  explanation_correct: Losing existing health coverage is a qualifying life event that triggers a Special Enrollment Period,
    allowing the person to enroll in a Marketplace plan outside of Open Enrollment.
  explanation_incorrect:
    A: Losing coverage does not restart Open Enrollment; it triggers a Special Enrollment Period.
    C: Medicaid enrollment depends on income eligibility, not automatic assignment.
    D: There is no mandatory one-year waiting period; a 60-day SEP window applies.
  fact_id: FACT-PAT-005
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-062
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which factor determines eligibility for employer-sponsored health insurance?
  options:
    A: The employee's household income
    B: The employer's plan rules
    C: The employee's state of residency
    D: The employee's credit history
  correct_answer: B
  explanation_correct: Eligibility for employer-sponsored health insurance is determined by the employer's plan rules, such
    as work hours and employment status.
  explanation_incorrect:
    A: Household income is relevant to Marketplace eligibility, not employer-sponsored plans.
    C: State residency affects Marketplace eligibility, not typically employer plan eligibility.
    D: Credit history does not determine health insurance eligibility.
  fact_id: FACT-PAT-007
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-063
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following can a patient request under HIPAA besides accessing their own records?
  options:
    A: Deleting all records from every provider they have ever visited
    B: Amendments to inaccurate or incomplete information in their records
    C: A copy of another patient's records for comparison
    D: A refund of all copayments made in the past year
  correct_answer: B
  explanation_correct: Under HIPAA, patients have the right to request amendments to their health records if they believe
    the information is inaccurate or incomplete.
  explanation_incorrect:
    A: HIPAA does not grant a blanket right to delete all records across all providers.
    C: Accessing another patient's records would violate HIPAA privacy rules.
    D: Copayment refunds are a billing matter, not a HIPAA privacy right.
  fact_id: FACT-PAT-010
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-064
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A patient asks their doctor's office to send medical records to a family member. Under HIPAA, which statement
    is correct?
  options:
    A: The office must refuse because records can only go to the patient
    B: The office can send the records only if the family member is a doctor
    C: The patient can direct the covered entity to send records to a third party of their choice
    D: The office must get permission from the insurance company first
  correct_answer: C
  explanation_correct: Under HIPAA, patients can direct a covered entity to send a copy of their health information to a third
    party of their choice, including a family member.
  explanation_incorrect:
    A: HIPAA allows patients to designate third-party recipients for their records.
    B: The third party does not need to be a medical professional.
    D: Insurance company permission is not required for patient-directed record sharing.
  fact_id: FACT-PAT-012
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-065
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which entity enforces HIPAA and receives patient privacy complaints?
  options:
    A: The Centers for Disease Control and Prevention (CDC)
    B: The Food and Drug Administration (FDA)
    C: The U.S. Department of Health and Human Services (HHS)
    D: The Social Security Administration (SSA)
  correct_answer: C
  explanation_correct: Patients have the right to file a HIPAA privacy complaint with HHS, which enforces the HIPAA Privacy
    Rule through its Office for Civil Rights.
  explanation_incorrect:
    A: The CDC focuses on disease prevention and public health, not HIPAA enforcement.
    B: The FDA regulates food and drugs, not health information privacy.
    D: The SSA administers Social Security benefits, not HIPAA.
  fact_id: FACT-PAT-013
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-066
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: When must a patient receive a Notice of Privacy Practices?
  options:
    A: Only when they are admitted to a hospital
    B: Only when they file an insurance claim
    C: At or before their first encounter with a covered health care provider or health plan
    D: Only when they request it in writing
  correct_answer: C
  explanation_correct: HIPAA requires covered entities to provide the Notice of Privacy Practices at or before the first delivery
    of service, ensuring patients know how their information may be used.
  explanation_incorrect:
    A: The notice is not limited to hospital admissions; all covered providers must issue it.
    B: Filing a claim does not trigger the notice requirement; the first encounter does.
    D: The covered entity must proactively provide it, not wait for a written request.
  fact_id: FACT-PAT-014
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-067
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What type of document is the Notice of Privacy Practices written in?
  options:
    A: Medical terminology only clinicians can understand
    B: Legal language designed for attorneys
    C: Plain language so patients can understand it
    D: Encrypted text for security purposes
  correct_answer: C
  explanation_correct: The Notice of Privacy Practices is a plain-language document designed so patients can understand how
    their health information may be used and disclosed.
  explanation_incorrect:
    A: The notice is specifically written to be understandable by patients, not just clinicians.
    B: While it has legal significance, it is written in plain language for patient comprehension.
    D: The notice is a readable document, not an encrypted file.
  fact_id: FACT-PAT-014
  regulatory_tags:
  - HIPAA
  difficulty: basic
- question_id: Q-PAT-068
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Informed consent is best described as which of the following?
  options:
    A: A one-time signature on an admission form
    B: A communication process between clinician and patient about a proposed treatment
    C: A billing authorization from the insurance company
    D: A legal contract between the hospital and the patient's employer
  correct_answer: B
  explanation_correct: Informed consent is a communication process in which a clinician explains the risks, benefits, and
    alternatives of a proposed treatment so the patient can make a voluntary, informed decision.
  explanation_incorrect:
    A: Informed consent is an ongoing dialogue, not just a single signature.
    C: Insurance billing authorization is separate from clinical informed consent.
    D: It is a clinician-patient process, not an employer contract.
  fact_id: FACT-PAT-015
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-069
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following is NOT part of the informed consent discussion?
  options:
    A: Risks of the proposed treatment
    B: Benefits of the proposed treatment
    C: The provider's salary information
    D: Alternatives to the proposed treatment
  correct_answer: C
  explanation_correct: Informed consent covers risks, benefits, and alternatives of a proposed treatment. The provider's salary
    is irrelevant to the consent process.
  explanation_incorrect:
    A: Risks are a core element of informed consent.
    B: Benefits are a core element of informed consent.
    D: Alternatives are a core element of informed consent.
  fact_id: FACT-PAT-015
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-070
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: An unconscious patient arrives at the emergency room with a life-threatening injury and no family is present.
    What happens with informed consent?
  options:
    A: Treatment is delayed until a family member arrives
    B: The hospital must get a court order before treating
    C: Informed consent may be waived so emergency treatment can proceed
    D: The insurance company provides consent on the patient's behalf
  correct_answer: C
  explanation_correct: In life-threatening emergencies where the patient cannot consent and no authorized decision-maker is
    available, informed consent may be waived.
  explanation_incorrect:
    A: Delaying life-saving treatment to wait for family could result in harm or death.
    B: A court order is not required in emergency situations.
    D: Insurance companies do not provide medical consent.
  fact_id: FACT-PAT-017
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-071
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which cost-sharing component does a patient pay before the insurance plan begins covering services?
  options:
    A: Copayment
    B: Premium
    C: Deductible
    D: Coinsurance
  correct_answer: C
  explanation_correct: The deductible is the amount a patient must pay out of pocket for covered services each year before
    the insurance plan begins paying its share.
  explanation_incorrect:
    A: Copayments are fixed per-visit fees, not the initial annual threshold.
    B: Premiums maintain coverage but do not count toward the deductible.
    D: Coinsurance applies after the deductible has been met.
  fact_id: FACT-PAT-019
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-072
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: How does a copayment differ from coinsurance?
  options:
    A: A copayment is a percentage and coinsurance is a fixed amount
    B: A copayment is a fixed dollar amount and coinsurance is a percentage of the cost
    C: A copayment applies before the deductible and coinsurance applies after
    D: There is no difference; they are the same thing
  correct_answer: B
  explanation_correct: A copayment is a fixed dollar amount (e.g., $25), while coinsurance is a percentage of the service
    cost (e.g., 20%) paid after the deductible.
  explanation_incorrect:
    A: This reverses the definitions. Copayment is the fixed amount and coinsurance is the percentage.
    C: While coinsurance typically applies after the deductible, the core difference is fixed amount versus percentage.
    D: They are distinct cost-sharing mechanisms.
  fact_id: FACT-PAT-020
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-073
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which cost-sharing component is paid monthly to keep health insurance coverage active?
  options:
    A: Deductible
    B: Coinsurance
    C: Copayment
    D: Premium
  correct_answer: D
  explanation_correct: A premium is the amount paid — usually monthly — to maintain health insurance coverage, regardless
    of whether the patient uses any medical services.
  explanation_incorrect:
    A: A deductible is an annual out-of-pocket threshold, not a monthly payment.
    B: Coinsurance is a percentage paid at the time of service, not a monthly fee.
    C: A copayment is a per-visit charge, not a recurring monthly cost.
  fact_id: FACT-PAT-018
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-074
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Once a patient reaches their out-of-pocket maximum for the year, who pays for additional covered services?
  options:
    A: The patient continues to pay copays only
    B: The health plan pays 100% of covered costs
    C: Costs are split 50/50 between the patient and the plan
    D: The patient must purchase supplemental insurance
  correct_answer: B
  explanation_correct: Once the out-of-pocket maximum is reached, the health plan pays 100% of covered costs for the remainder
    of the plan year.
  explanation_incorrect:
    A: After reaching the out-of-pocket maximum, the patient pays nothing more for covered services.
    C: There is no 50/50 split; the plan covers 100%.
    D: Supplemental insurance is not required once the out-of-pocket maximum is met.
  fact_id: FACT-PAT-022
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-075
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: A patient receives an EOB that lists a $500 charge, $350 paid by the plan, and $150 as the patient's responsibility.
    What should the patient do next?
  options:
    A: Pay $500 immediately to the provider
    B: Ignore the EOB since it is not a bill
    C: Compare the EOB with the provider's bill to confirm the amounts match before paying
    D: Contact the IRS to report the charge
  correct_answer: C
  explanation_correct: Patients should compare the EOB from their health plan with the provider's bill to confirm that services
    and amounts match before making any payment.
  explanation_incorrect:
    A: The patient owes $150, not $500, and should verify with the provider bill first.
    B: While the EOB is not a bill, the patient should use it to verify the provider's bill.
    D: The IRS does not handle medical billing disputes.
  fact_id: FACT-PAT-024
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-076
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: What is patient activation?
  options:
    A: The process of registering for a health insurance plan
    B: A patient's knowledge, skills, and confidence to manage their own health care
    C: The moment a patient's insurance coverage becomes effective
    D: A provider's decision to admit a patient to the hospital
  correct_answer: B
  explanation_correct: Patient activation refers to a patient's knowledge, skills, and confidence to actively participate
    in their own health care decisions.
  explanation_incorrect:
    A: Plan registration is an enrollment activity, not activation in the patient engagement sense.
    C: Coverage effective dates are administrative, not a measure of patient engagement.
    D: Admission decisions are made by providers, not a reflection of patient activation.
  fact_id: FACT-PAT-025
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-077
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Research shows that higher patient engagement is associated with which outcome?
  options:
    A: Longer hospital stays
    B: Higher overall healthcare costs
    C: Better health outcomes and lower costs
    D: Fewer doctor visits and less preventive care
  correct_answer: C
  explanation_correct: Studies show that higher patient activation and engagement is associated with better health outcomes
    and lower healthcare costs.
  explanation_incorrect:
    A: Engaged patients tend to manage conditions more effectively, not stay longer in hospitals.
    B: Higher engagement is linked to lower costs, not higher costs.
    D: Engaged patients often use more preventive care, not less.
  fact_id: FACT-PAT-025
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-078
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following is an example of a domestic partner being a dependent?
  options:
    A: A coworker who shares an office with the subscriber
    B: A person in a committed relationship who is covered under the subscriber's health plan
    C: A roommate who splits rent with the subscriber
    D: A business partner who co-owns a company with the subscriber
  correct_answer: B
  explanation_correct: A domestic partner in a committed relationship can be listed as a dependent under the subscriber's
    health plan, depending on the plan's rules.
  explanation_incorrect:
    A: Coworkers do not qualify as dependents based on sharing a workspace.
    C: Roommates are not considered dependents on a health plan.
    D: A business partner is a professional relationship, not a dependent relationship.
  fact_id: FACT-PAT-002
  regulatory_tags: []
  difficulty: basic
- question_id: Q-PAT-079
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Moving to a new state is considered what type of event for health insurance purposes?
  options:
    A: An open enrollment trigger
    B: A premium adjustment event
    C: A qualifying life event
    D: A coverage termination event
  correct_answer: C
  explanation_correct: Moving to a new coverage area is a qualifying life event that triggers a Special Enrollment Period,
    allowing the person to enroll in or change a Marketplace plan.
  explanation_incorrect:
    A: Moving does not restart Open Enrollment; it triggers a Special Enrollment Period.
    B: Premium adjustments are not directly triggered by moving.
    D: Moving does not automatically terminate coverage, though it may require a plan change.
  fact_id: FACT-PAT-005
  regulatory_tags:
  - ACA
  difficulty: basic
- question_id: Q-PAT-080
  type: MCQ
  pillar: patient
  tutorial_id: T-PATIENT-01
  question: Which of the following statements about a health insurance premium is correct?
  options:
    A: The premium is only charged in months when the patient sees a doctor
    B: The premium counts toward the patient's deductible
    C: The premium is paid regardless of whether the patient uses medical services
    D: The premium is refunded at the end of the year if no claims are filed
  correct_answer: C
  explanation_correct: A premium is paid — usually monthly — to maintain coverage, whether or not the patient uses any medical
    services.
  explanation_incorrect:
    A: Premiums are due every billing period regardless of utilization.
    B: Premiums do not count toward the deductible or out-of-pocket maximum.
    D: Premiums are not refunded based on claims activity.
  fact_id: FACT-PAT-018
  regulatory_tags: []
  difficulty: basic
- question_id: Q-DAT-016
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-001
  question: PHI includes information about a person's past, present, or future physical or mental health condition.
  correct_answer: 'True'
  explanation_correct: By definition, PHI covers individually identifiable health information relating to past, present, or
    future health, care, or payment for care.
  explanation_incorrect: This statement is accurate. PHI is not limited to current conditions — it encompasses past, present,
    and future health information.
- question_id: Q-DAT-017
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-002
  question: A patient's date of birth becomes PHI only when it is linked to health information.
  correct_answer: 'True'
  explanation_correct: Common identifiers such as date of birth become PHI when they are associated with health information
    about the individual.
  explanation_incorrect: A date of birth by itself is not PHI. It is the association with health data that makes it protected.
- question_id: Q-DAT-018
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-003
  question: A conversation between a doctor and a nurse about a patient's diagnosis is not considered PHI because it is spoken
    aloud.
  correct_answer: 'False'
  explanation_correct: PHI is protected under HIPAA regardless of form, including oral communications.
  explanation_incorrect: Oral disclosures of individually identifiable health information are still PHI and are subject to
    HIPAA protections.
- question_id: Q-DAT-019
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-007
  question: Under the HIPAA Privacy Rule, patients have the right to obtain a copy of their own protected health information.
  correct_answer: 'True'
  explanation_correct: The HIPAA Privacy Rule gives individuals the right to access, inspect, and obtain a copy of their own
    PHI.
  explanation_incorrect: Patient access to their own health records is a core right established by the Privacy Rule.
- question_id: Q-DAT-020
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-008
  question: A health care clearinghouse is one of the three types of HIPAA covered entities.
  correct_answer: 'True'
  explanation_correct: HIPAA defines three types of covered entities — health plans, health care clearinghouses, and certain
    health care providers.
  explanation_incorrect: Health care clearinghouses are explicitly listed as one of the three types of covered entities under
    HIPAA.
- question_id: Q-DAT-021
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-010
  question: The HIPAA Security Rule applies to all forms of PHI, including paper records and oral communications.
  correct_answer: 'False'
  explanation_correct: The HIPAA Security Rule specifically protects electronic PHI (ePHI). The Privacy Rule, not the Security
    Rule, covers PHI in all forms.
  explanation_incorrect: The Security Rule is limited to ePHI. Paper and oral PHI are protected under the broader Privacy
    Rule.
- question_id: Q-DAT-022
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-011
  question: Physical safeguards under the HIPAA Security Rule include policies for protecting facilities and equipment that
    store ePHI.
  correct_answer: 'True'
  explanation_correct: Physical safeguards address the protection of physical facilities, workstations, and devices that store
    or access ePHI.
  explanation_incorrect: Facility access controls and workstation security are examples of physical safeguards required by
    the Security Rule.
- question_id: Q-DAT-023
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-013
  question: When a breach of unsecured PHI affects 500 or more residents of a state, the covered entity must notify prominent
    media outlets.
  correct_answer: 'True'
  explanation_correct: The Breach Notification Rule requires media notification when a breach affects 500 or more residents
    of a state or jurisdiction.
  explanation_incorrect: Large-scale breaches (500+ affected individuals in a state) trigger a media notification requirement
    in addition to individual notices.
- question_id: Q-DAT-024
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-013
  question: Breaches of unsecured PHI that affect fewer than 500 individuals do not need to be reported to HHS at all.
  correct_answer: 'False'
  explanation_correct: Smaller breaches (fewer than 500 individuals) must still be reported to HHS, but they are submitted
    annually rather than within 60 days.
  explanation_incorrect: All breaches of unsecured PHI must be reported to HHS. Smaller breaches are reported on an annual
    basis.
- question_id: Q-DAT-025
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-016
  question: ICD-10-PCS codes are used by all health care providers in every clinical setting to code diagnoses.
  correct_answer: 'False'
  explanation_correct: ICD-10-PCS codes are used specifically for inpatient hospital procedures. ICD-10-CM codes are used
    by all providers to code diagnoses.
  explanation_incorrect: ICD-10-PCS (Procedure Coding System) is limited to inpatient hospital procedures. ICD-10-CM is the
    system used across all settings for diagnoses.
- question_id: Q-DAT-026
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-017
  question: ICD-10 codes can be up to 7 characters long, providing more clinical detail than ICD-9 codes.
  correct_answer: 'True'
  explanation_correct: ICD-10 codes can be up to 7 characters, compared to shorter ICD-9 codes, allowing more detail about
    location, severity, and type of condition.
  explanation_incorrect: The expanded character length of ICD-10 codes is one of the key improvements over ICD-9, enabling
    greater specificity.
- question_id: Q-DAT-027
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-019
  question: CPT codes are maintained by the Centers for Medicare and Medicaid Services (CMS).
  correct_answer: 'False'
  explanation_correct: CPT codes are maintained by the American Medical Association (AMA), not CMS. HCPCS Level II codes are
    maintained by CMS.
  explanation_incorrect: The AMA develops and maintains CPT codes. CMS maintains HCPCS Level II codes.
- question_id: Q-DAT-028
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-022
  question: Patients typically pay less when they receive care from an out-of-network provider compared to an in-network provider.
  correct_answer: 'False'
  explanation_correct: Out-of-network providers do not have pre-negotiated rates with the insurer, so patients typically pay
    significantly more.
  explanation_incorrect: In-network providers have contracted rates with the insurer, resulting in lower costs. Out-of-network
    care costs more.
- question_id: Q-DAT-029
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-024
  question: One benefit of Electronic Health Records is reducing the duplication of tests for patients.
  correct_answer: 'True'
  explanation_correct: EHRs help reduce duplication of tests by making health information available electronically to authorized
    providers.
  explanation_incorrect: When providers can view existing test results in an EHR, they are less likely to order redundant
    tests.
- question_id: Q-DAT-030
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-018
  question: HCPCS Level II codes are the same as CPT codes.
  correct_answer: 'False'
  explanation_correct: HCPCS Level I consists of CPT codes, not Level II. Level II covers products, supplies, and services
    not included in CPT.
  explanation_incorrect: CPT codes make up HCPCS Level I. Level II is a separate set of codes maintained by CMS for items
    like durable medical equipment and ambulance services.
- question_id: Q-DAT-031
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-009
  question: A business associate may handle PHI on behalf of a covered entity without any written agreement as long as both
    parties verbally agree.
  correct_answer: 'False'
  explanation_correct: A business associate must sign a written Business Associate Agreement before handling PHI on behalf
    of a covered entity.
  explanation_incorrect: HIPAA requires a formal written agreement — a verbal agreement is not sufficient.
- question_id: Q-DAT-032
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-010
  question: The HIPAA Security Rule requires covered entities and business associates to ensure the confidentiality, integrity,
    and availability of ePHI.
  correct_answer: 'True'
  explanation_correct: The Security Rule establishes national standards to protect ePHI, requiring confidentiality, integrity,
    and availability.
  explanation_incorrect: These three principles — confidentiality, integrity, and availability — are the core objectives of
    the HIPAA Security Rule.
- question_id: Q-DAT-033
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-025
  question: Certified EHR technology stores patient data in an unstructured format that requires manual sorting by providers.
  correct_answer: 'False'
  explanation_correct: Certified EHR technology stores patient data in a structured format that allows easy retrieval, transfer,
    and use.
  explanation_incorrect: Structured data storage is a key feature of certified EHR technology, enabling providers to efficiently
    access and use patient information.
- question_id: Q-DAT-034
  type: TF
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-015
  question: The transition from ICD-9 to ICD-10 expanded the number of available diagnosis codes from approximately 14,000
    to approximately 69,000.
  correct_answer: 'True'
  explanation_correct: The ICD-10 transition dramatically increased the number of available diagnosis codes from roughly 14,000
    to roughly 69,000.
  explanation_incorrect: This expansion allowed for far greater clinical specificity in documenting diagnoses.
- question_id: Q-DAT-035
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-001
  question: Which of the following categories of information does PHI relate to?
  options:
    A: A person's health condition, health care provision, or payment for health care
    B: A person's employment history and salary information
    C: A person's educational background and academic records
    D: A person's criminal record and court proceedings
  correct_answer: A
  explanation_correct: PHI relates to a person's past, present, or future health, the provision of health care, or payment
    for health care.
  explanation_incorrect_B: Employment and salary data are not health information and are not covered by HIPAA.
  explanation_incorrect_C: Educational records fall under FERPA, not HIPAA.
  explanation_incorrect_D: Criminal records are not health information protected under HIPAA.
- question_id: Q-DAT-036
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-002
  question: Which of the following is NOT typically considered a common PHI identifier?
  options:
    A: Patient's name
    B: Patient's blood type when not linked to any identifying information
    C: Patient's Social Security Number linked to health data
    D: Patient's home address linked to health data
  correct_answer: B
  explanation_correct: A blood type by itself, with no link to an individual's identity, is not PHI. PHI requires both health
    data and an identifier.
  explanation_incorrect_A: A patient's name linked to health information is a common PHI identifier.
  explanation_incorrect_C: A Social Security Number linked to health data is a classic example of PHI.
  explanation_incorrect_D: A home address linked to health information qualifies as PHI.
- question_id: Q-DAT-037
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-003
  question: PHI is protected under HIPAA in which of the following forms?
  options:
    A: Electronic only
    B: Electronic and paper only
    C: Electronic, paper, and oral
    D: Paper and oral only
  correct_answer: C
  explanation_correct: HIPAA protects PHI regardless of its form — electronic, paper, or oral.
  explanation_incorrect_A: Electronic-only protection would leave paper records and spoken information unprotected.
  explanation_incorrect_B: Oral communications containing PHI are also protected under HIPAA.
  explanation_incorrect_D: Electronic PHI is also protected under HIPAA, particularly by the Security Rule.
- question_id: Q-DAT-038
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-004
  question: The HIPAA Privacy Rule applies to which of the following?
  options:
    A: Only hospitals and physician offices
    B: Covered entities and their business associates
    C: Only health insurance companies
    D: Only federal government health programs
  correct_answer: B
  explanation_correct: The Privacy Rule establishes standards for covered entities and their business associates regarding
    the protection of PHI.
  explanation_incorrect_A: The Privacy Rule applies to all covered entities, not just hospitals and physician offices.
  explanation_incorrect_C: Health plans are only one type of covered entity. Providers and clearinghouses are also covered.
  explanation_incorrect_D: The Privacy Rule applies broadly to covered entities in both the private and public sectors.
- question_id: Q-DAT-039
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-005
  question: What is the purpose of the minimum necessary standard?
  options:
    A: To require the smallest possible electronic file size for health records
    B: To limit PHI use and disclosure to the minimum amount needed for the intended purpose
    C: To ensure that only the minimum number of staff members have access to medical equipment
    D: To set the minimum number of patient visits required before PHI can be created
  correct_answer: B
  explanation_correct: The minimum necessary standard requires covered entities to limit PHI use and disclosure to the minimum
    needed for the intended purpose.
  explanation_incorrect_A: The standard relates to PHI disclosure limits, not file size or data storage.
  explanation_incorrect_C: Staffing levels for equipment access are not related to the minimum necessary standard.
  explanation_incorrect_D: The standard governs how much PHI is shared, not how many patient visits occur.
- question_id: Q-DAT-040
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-006
  question: Which type of PHI disclosure is exempt from the minimum necessary requirement?
  options:
    A: Disclosures for health plan marketing campaigns
    B: Disclosures for treatment purposes between health care providers
    C: Disclosures to law enforcement for non-urgent inquiries
    D: Disclosures to employers for workplace wellness programs
  correct_answer: B
  explanation_correct: Treatment-related disclosures between health care providers are specifically exempt from the minimum
    necessary standard.
  explanation_incorrect_A: Marketing disclosures are not exempt from HIPAA requirements.
  explanation_incorrect_C: Law enforcement disclosures are not broadly exempt from the minimum necessary standard.
  explanation_incorrect_D: Employer wellness disclosures are not exempt from the minimum necessary requirement.
- question_id: Q-DAT-041
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-007
  question: Under the HIPAA Privacy Rule, which right do patients have regarding their PHI?
  options:
    A: The right to delete any information from the provider's records permanently
    B: The right to access, inspect, and obtain a copy of their PHI
    C: The right to prevent any provider from viewing their PHI
    D: The right to edit their medical records directly without provider involvement
  correct_answer: B
  explanation_correct: The Privacy Rule grants individuals the right to access, inspect, and obtain a copy of their own PHI.
  explanation_incorrect_A: Patients can request amendments, but providers are not required to delete records.
  explanation_incorrect_C: Patients cannot universally block all provider access to PHI needed for treatment.
  explanation_incorrect_D: Patients may request amendments, but they cannot directly edit their medical records.
- question_id: Q-DAT-042
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-008
  question: Which of the following qualifies as a HIPAA covered entity?
  options:
    A: A health care provider who transmits health information electronically in connection with covered transactions
    B: A medical device manufacturer that sells equipment to hospitals
    C: A pharmaceutical company that develops prescription drugs
    D: A health and wellness blog that publishes medical advice
  correct_answer: A
  explanation_correct: Health care providers who transmit health information electronically in connection with covered transactions
    are one of the three types of covered entities.
  explanation_incorrect_B: Medical device manufacturers are not covered entities unless they also function as a provider,
    plan, or clearinghouse.
  explanation_incorrect_C: Pharmaceutical companies are not covered entities under HIPAA.
  explanation_incorrect_D: A blog publishing medical advice is not a covered entity.
- question_id: Q-DAT-043
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-008
  question: What distinguishes a health care clearinghouse from other covered entities?
  options:
    A: It provides direct patient care in a clinical setting
    B: It processes health information received from another entity into a standard format
    C: It sells health insurance policies to individuals
    D: It manufactures medical equipment for hospitals
  correct_answer: B
  explanation_correct: Health care clearinghouses process health information received from one entity into a standard format
    for another entity.
  explanation_incorrect_A: Clearinghouses do not provide direct patient care — that is the role of providers.
  explanation_incorrect_C: Selling insurance policies is the function of health plans, not clearinghouses.
  explanation_incorrect_D: Equipment manufacturing is not a clearinghouse function.
- question_id: Q-DAT-044
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-009
  question: What must a business associate sign before handling PHI on behalf of a covered entity?
  options:
    A: A patient consent form
    B: A written Business Associate Agreement
    C: A state medical license application
    D: A provider enrollment form
  correct_answer: B
  explanation_correct: A business associate must sign a written Business Associate Agreement (BAA) to comply with HIPAA rules
    before handling PHI.
  explanation_incorrect_A: Patient consent forms are signed by patients, not business associates.
  explanation_incorrect_C: A medical license is for health care providers, not business associates.
  explanation_incorrect_D: Provider enrollment is for providers participating in health plans, not for business associates.
- question_id: Q-DAT-045
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-009
  question: Which of the following is an example of a business associate?
  options:
    A: A patient receiving treatment at a hospital
    B: A billing company that processes claims containing PHI for a physician's office
    C: A nurse providing direct care to a patient in a hospital
    D: A health insurer paying claims to a provider
  correct_answer: B
  explanation_correct: A billing company that handles PHI on behalf of a covered entity is a business associate and must have
    a BAA in place.
  explanation_incorrect_A: A patient is not a business associate — they are the individual whose PHI is being protected.
  explanation_incorrect_C: A nurse providing care is part of the covered entity (the provider), not a separate business associate.
  explanation_incorrect_D: A health insurer is itself a covered entity, not a business associate of another covered entity
    in this context.
- question_id: Q-DAT-046
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-010
  question: The HIPAA Security Rule specifically protects which type of information?
  options:
    A: All patient information in any form
    B: Electronic protected health information (ePHI)
    C: Only paper-based medical records
    D: Only oral communications between providers
  correct_answer: B
  explanation_correct: The Security Rule specifically addresses the protection of electronic protected health information
    (ePHI).
  explanation_incorrect_A: The Security Rule focuses on ePHI. The Privacy Rule provides broader protection for PHI in all
    forms.
  explanation_incorrect_C: Paper records are covered by the Privacy Rule, not the Security Rule.
  explanation_incorrect_D: Oral communications are covered by the Privacy Rule, not the Security Rule.
- question_id: Q-DAT-047
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-010
  question: Which of the following is one of the three core objectives the HIPAA Security Rule aims to ensure for ePHI?
  options:
    A: Profitability
    B: Availability
    C: Portability
    D: Marketability
  correct_answer: B
  explanation_correct: The Security Rule requires ensuring the confidentiality, integrity, and availability of ePHI.
  explanation_incorrect_A: Profitability is a business objective, not a security objective under HIPAA.
  explanation_incorrect_C: While HIPAA includes portability provisions, the Security Rule focuses on confidentiality, integrity,
    and availability.
  explanation_incorrect_D: Marketability is not a security objective under HIPAA.
- question_id: Q-DAT-048
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-011
  question: Which of the following is an example of an administrative safeguard under the HIPAA Security Rule?
  options:
    A: Installing locks on server room doors
    B: Implementing workforce training policies on handling ePHI
    C: Using encryption software to protect data in transit
    D: Placing fire extinguishers near data storage equipment
  correct_answer: B
  explanation_correct: Administrative safeguards include policies and procedures such as workforce training on handling ePHI.
  explanation_incorrect_A: Locks on server rooms are a physical safeguard.
  explanation_incorrect_C: Encryption is a technical safeguard.
  explanation_incorrect_D: Fire protection for equipment is a physical safeguard.
- question_id: Q-DAT-049
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-011
  question: Which of the following is an example of a technical safeguard under the HIPAA Security Rule?
  options:
    A: Conducting background checks on employees
    B: Storing backup tapes in a locked offsite location
    C: Implementing access controls that require unique user IDs and passwords
    D: Training staff on privacy policies
  correct_answer: C
  explanation_correct: Technical safeguards are technology-based controls such as access controls, user authentication, and
    encryption.
  explanation_incorrect_A: Background checks are an administrative safeguard.
  explanation_incorrect_B: Offsite storage of backup tapes is a physical safeguard.
  explanation_incorrect_D: Staff training is an administrative safeguard.
- question_id: Q-DAT-050
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-012
  question: Under the Breach Notification Rule, what is the maximum number of days a covered entity has to notify affected
    individuals after discovering a breach of unsecured PHI?
  options:
    A: 30 days
    B: 45 days
    C: 60 days
    D: 90 days
  correct_answer: C
  explanation_correct: The Breach Notification Rule requires notification without unreasonable delay and no later than 60
    days after discovery.
  explanation_incorrect_A: 30 days is shorter than the required notification window.
  explanation_incorrect_B: 45 days is not the correct timeframe under the rule.
  explanation_incorrect_D: 90 days exceeds the maximum allowed notification period.
- question_id: Q-DAT-051
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-013
  question: What triggers the requirement for a covered entity to notify prominent media outlets about a breach?
  options:
    A: Any breach affecting at least one individual
    B: A breach affecting 500 or more residents of a state or jurisdiction
    C: A breach involving electronic records only
    D: A breach that occurs at a federal government facility
  correct_answer: B
  explanation_correct: Media notification is required when a breach affects 500 or more residents of a single state or jurisdiction.
  explanation_incorrect_A: Media notification is not required for every breach — only large-scale breaches trigger this requirement.
  explanation_incorrect_C: The format of the records is not what triggers media notification — it is the number of affected
    individuals.
  explanation_incorrect_D: The type of facility does not determine whether media notification is required.
- question_id: Q-DAT-052
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-013
  question: How are breaches of unsecured PHI affecting fewer than 500 individuals reported to HHS?
  options:
    A: They do not need to be reported to HHS
    B: They must be reported within 60 days of discovery
    C: They are submitted to HHS annually
    D: They are reported to state authorities instead of HHS
  correct_answer: C
  explanation_correct: Smaller breaches affecting fewer than 500 individuals are reported to HHS on an annual basis.
  explanation_incorrect_A: All breaches of unsecured PHI must be reported to HHS regardless of size.
  explanation_incorrect_B: The 60-day individual notification requirement applies, but HHS reporting for small breaches is
    annual.
  explanation_incorrect_D: HHS reporting is required for all breaches. State notification may also apply but does not replace
    HHS reporting.
- question_id: Q-DAT-053
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-014
  question: What does the abbreviation ICD stand for?
  options:
    A: Integrated Clinical Database
    B: International Classification of Diseases
    C: Internal Code for Diagnoses
    D: Insurance Claims Documentation
  correct_answer: B
  explanation_correct: ICD stands for International Classification of Diseases, the standardized system for coding diagnoses.
  explanation_incorrect_A: There is no standardized coding system called the Integrated Clinical Database.
  explanation_incorrect_C: ICD does not stand for Internal Code for Diagnoses.
  explanation_incorrect_D: ICD is a diagnostic classification system, not an insurance claims documentation system.
- question_id: Q-DAT-054
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-014
  question: ICD codes are primarily used to represent which of the following on claims and medical records?
  options:
    A: Provider credentials and specialties
    B: Medical diagnoses and inpatient procedures
    C: Insurance premium amounts
    D: Prescription drug dosages
  correct_answer: B
  explanation_correct: ICD codes are standardized codes used to represent medical diagnoses and inpatient procedures on claims
    and records.
  explanation_incorrect_A: Provider credentials are not represented by ICD codes.
  explanation_incorrect_C: Insurance premiums are financial amounts, not coded with ICD.
  explanation_incorrect_D: Drug dosages are not classified using ICD codes.
- question_id: Q-DAT-055
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-015
  question: On what date did the United States transition from ICD-9 to ICD-10?
  options:
    A: January 1, 2010
    B: October 1, 2015
    C: July 1, 2013
    D: March 1, 2018
  correct_answer: B
  explanation_correct: The U.S. transitioned from ICD-9 to ICD-10 on October 1, 2015.
  explanation_incorrect_A: January 1, 2010 was not the ICD-10 transition date.
  explanation_incorrect_C: July 1, 2013 was not the transition date, though it was an earlier proposed deadline.
  explanation_incorrect_D: March 1, 2018 is well after the actual transition date.
- question_id: Q-DAT-056
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-015
  question: Approximately how many diagnosis codes does ICD-10 contain, compared to ICD-9?
  options:
    A: ICD-9 had 69,000; ICD-10 has 14,000
    B: ICD-9 had 14,000; ICD-10 has 69,000
    C: ICD-9 had 5,000; ICD-10 has 25,000
    D: ICD-9 had 30,000; ICD-10 has 100,000
  correct_answer: B
  explanation_correct: ICD-9 had approximately 14,000 diagnosis codes; ICD-10 expanded this to approximately 69,000.
  explanation_incorrect_A: This reverses the numbers. ICD-10 has more codes than ICD-9.
  explanation_incorrect_C: These numbers do not reflect the actual code counts for either system.
  explanation_incorrect_D: Neither 30,000 nor 100,000 reflects the actual code counts.
- question_id: Q-DAT-057
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-016
  question: Which coding system is used specifically for inpatient hospital procedures?
  options:
    A: ICD-10-CM
    B: ICD-10-PCS
    C: CPT
    D: HCPCS Level II
  correct_answer: B
  explanation_correct: ICD-10-PCS (Procedure Coding System) is used specifically for coding inpatient hospital procedures.
  explanation_incorrect_A: ICD-10-CM is used for diagnosis coding across all settings, not specifically for inpatient procedures.
  explanation_incorrect_C: CPT codes identify medical services and procedures but are not specific to inpatient hospital procedures.
  explanation_incorrect_D: HCPCS Level II codes cover supplies, equipment, and services not included in CPT.
- question_id: Q-DAT-058
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-016
  question: What does the abbreviation CM stand for in ICD-10-CM?
  options:
    A: Comprehensive Medicine
    B: Clinical Modification
    C: Claims Management
    D: Certified Medical
  correct_answer: B
  explanation_correct: CM stands for Clinical Modification. ICD-10-CM codes are used by all providers to code diagnoses.
  explanation_incorrect_A: CM does not stand for Comprehensive Medicine.
  explanation_incorrect_C: CM does not stand for Claims Management.
  explanation_incorrect_D: CM does not stand for Certified Medical.
- question_id: Q-DAT-059
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-017
  question: What is the maximum character length of an ICD-10 code?
  options:
    A: 3 characters
    B: 5 characters
    C: 7 characters
    D: 10 characters
  correct_answer: C
  explanation_correct: ICD-10 codes can be up to 7 characters long, providing detail about location, severity, and type of
    condition.
  explanation_incorrect_A: 3 characters would be the minimum category code, not the maximum length.
  explanation_incorrect_B: 5 characters is the length of CPT codes, not the maximum for ICD-10.
  explanation_incorrect_D: ICD-10 codes do not extend to 10 characters.
- question_id: Q-DAT-060
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-017
  question: What advantage does the longer character length of ICD-10 codes provide over ICD-9?
  options:
    A: Faster claims processing speed
    B: More detail about the location, severity, and type of a condition
    C: Lower insurance premiums for patients
    D: Fewer codes for providers to memorize
  correct_answer: B
  explanation_correct: The expanded character length of ICD-10 allows more clinical detail about location, severity, and type
    of condition.
  explanation_incorrect_A: Code length does not directly determine claims processing speed.
  explanation_incorrect_C: Insurance premiums are not determined by the length of diagnosis codes.
  explanation_incorrect_D: ICD-10 actually has far more codes than ICD-9, not fewer.
- question_id: Q-DAT-061
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-018
  question: HCPCS is a standardized coding system with how many levels?
  options:
    A: One
    B: Two
    C: Three
    D: Four
  correct_answer: B
  explanation_correct: HCPCS has two levels — Level I (CPT codes) and Level II (products, supplies, and services not included
    in CPT).
  explanation_incorrect_A: HCPCS has two levels, not one.
  explanation_incorrect_C: HCPCS has two levels. There was historically a Level III, but it was discontinued.
  explanation_incorrect_D: HCPCS does not have four levels.
- question_id: Q-DAT-062
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-018
  question: What does HCPCS Level II cover that is not included in CPT?
  options:
    A: Surgical procedures performed in hospitals
    B: Products, supplies, and services such as ambulance rides and durable medical equipment
    C: Mental health diagnosis codes
    D: Laboratory test result interpretations
  correct_answer: B
  explanation_correct: HCPCS Level II covers products, supplies, and services not included in CPT, such as ambulance services
    and durable medical equipment.
  explanation_incorrect_A: Surgical procedures are typically coded using CPT or ICD-10-PCS, not HCPCS Level II.
  explanation_incorrect_C: Mental health diagnoses are coded with ICD codes, not HCPCS Level II.
  explanation_incorrect_D: Lab test interpretations are typically coded with CPT, not HCPCS Level II.
- question_id: Q-DAT-063
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-019
  question: How many digits does a CPT code contain?
  options:
    A: 3 digits
    B: 4 digits
    C: 5 digits
    D: 7 digits
  correct_answer: C
  explanation_correct: CPT codes are 5-digit numeric codes that identify medical services and procedures.
  explanation_incorrect_A: CPT codes are longer than 3 digits.
  explanation_incorrect_B: 4 digits is the numeric portion of a HCPCS Level II code, but CPT codes have 5 digits.
  explanation_incorrect_D: 7 characters is the maximum length for ICD-10 codes, not CPT.
- question_id: Q-DAT-064
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-019
  question: What organization maintains and publishes CPT codes?
  options:
    A: Centers for Medicare and Medicaid Services (CMS)
    B: World Health Organization (WHO)
    C: American Medical Association (AMA)
    D: Department of Health and Human Services (HHS)
  correct_answer: C
  explanation_correct: The American Medical Association (AMA) develops and maintains CPT codes.
  explanation_incorrect_A: CMS maintains HCPCS Level II codes, not CPT codes.
  explanation_incorrect_B: WHO maintains the ICD classification system, not CPT.
  explanation_incorrect_D: HHS oversees HIPAA enforcement but does not maintain CPT codes.
- question_id: Q-DAT-065
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-020
  question: What is the format of a HCPCS Level II code?
  options:
    A: 5 numeric digits
    B: One alphabetical letter followed by 4 numeric digits
    C: 7 alphanumeric characters
    D: Two letters followed by 3 numeric digits
  correct_answer: B
  explanation_correct: HCPCS Level II codes consist of one alphabetical letter followed by 4 numeric digits.
  explanation_incorrect_A: 5 numeric digits describes a CPT code, not a HCPCS Level II code.
  explanation_incorrect_C: 7 alphanumeric characters describes the maximum length of an ICD-10 code.
  explanation_incorrect_D: HCPCS Level II codes begin with one letter, not two.
- question_id: Q-DAT-066
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-020
  question: Who maintains HCPCS Level II codes?
  options:
    A: The American Medical Association (AMA)
    B: The World Health Organization (WHO)
    C: The Centers for Medicare and Medicaid Services (CMS)
    D: The American Hospital Association (AHA)
  correct_answer: C
  explanation_correct: CMS maintains HCPCS Level II codes to identify items such as ambulance services, durable medical equipment,
    and prosthetics.
  explanation_incorrect_A: The AMA maintains CPT codes (HCPCS Level I), not Level II.
  explanation_incorrect_B: WHO maintains the ICD system, not HCPCS Level II.
  explanation_incorrect_D: The AHA is not responsible for maintaining HCPCS Level II codes.
- question_id: Q-DAT-067
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-020
  question: Which of the following items would most likely be coded using a HCPCS Level II code?
  options:
    A: An office visit with a primary care physician
    B: A wheelchair provided to a patient as durable medical equipment
    C: A diagnosis of type 2 diabetes
    D: An outpatient knee surgery
  correct_answer: B
  explanation_correct: HCPCS Level II codes identify items like durable medical equipment, ambulance services, and prosthetics.
  explanation_incorrect_A: An office visit would typically be coded with a CPT code.
  explanation_incorrect_C: A diagnosis is coded using an ICD code, not HCPCS Level II.
  explanation_incorrect_D: Outpatient surgery is typically coded with CPT codes.
- question_id: Q-DAT-068
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-021
  question: What is the primary financial benefit to patients of using an in-network provider?
  options:
    A: The provider waives all fees for insured patients
    B: The provider charges pre-negotiated rates, resulting in lower out-of-pocket costs
    C: The patient receives a tax credit for each in-network visit
    D: The patient's deductible is automatically waived
  correct_answer: B
  explanation_correct: In-network providers have pre-negotiated rates with the insurer, which results in lower out-of-pocket
    costs for patients.
  explanation_incorrect_A: In-network providers do not waive all fees — patients still have cost-sharing responsibilities.
  explanation_incorrect_C: Tax credits are not tied to using in-network providers.
  explanation_incorrect_D: Deductibles are not automatically waived for in-network visits.
- question_id: Q-DAT-069
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-022
  question: Why do patients typically pay more when using an out-of-network provider?
  options:
    A: Out-of-network providers charge higher taxes on their services
    B: The provider does not have a contract with the insurer, so there are no pre-negotiated rates
    C: Out-of-network providers use more expensive medical equipment
    D: The patient's insurance policy is cancelled when they go out of network
  correct_answer: B
  explanation_correct: Without a contract, the provider is not bound to pre-negotiated rates, so the patient bears higher
    costs.
  explanation_incorrect_A: Provider charges are not taxes and are not related to tax rates.
  explanation_incorrect_C: Equipment cost is not the reason patients pay more for out-of-network care.
  explanation_incorrect_D: Using an out-of-network provider does not cancel the patient's insurance policy.
- question_id: Q-DAT-070
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-021
  question: What does it mean for a provider to be "in-network"?
  options:
    A: The provider is located within the same state as the patient
    B: The provider has a contract with the patient's health insurer to provide services at agreed-upon rates
    C: The provider accepts only Medicare patients
    D: The provider works exclusively in a hospital setting
  correct_answer: B
  explanation_correct: An in-network provider has a contract with the patient's health insurer to provide services at pre-negotiated
    rates.
  explanation_incorrect_A: Network status is determined by a contractual relationship with an insurer, not geographic location.
  explanation_incorrect_C: In-network status applies to any insurer, not just Medicare.
  explanation_incorrect_D: In-network status is about the contractual relationship, not the practice setting.
- question_id: Q-DAT-071
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-023
  question: Which of the following is typically included in an Electronic Health Record (EHR)?
  options:
    A: A patient's credit score and financial history
    B: Demographics, medications, vital signs, and lab results
    C: The provider's malpractice insurance details
    D: The hospital's annual revenue reports
  correct_answer: B
  explanation_correct: EHRs include clinical data such as demographics, medications, vital signs, immunizations, lab results,
    and radiology reports.
  explanation_incorrect_A: Credit scores and financial history are not part of an EHR.
  explanation_incorrect_C: Provider insurance details are administrative records, not EHR content.
  explanation_incorrect_D: Hospital revenue reports are financial documents, not part of an EHR.
- question_id: Q-DAT-072
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-024
  question: How do EHRs help improve the quality of patient care?
  options:
    A: By eliminating the need for physicians entirely
    B: By reducing duplication of tests, decreasing treatment delays, and improving record accuracy
    C: By allowing patients to diagnose their own conditions
    D: By replacing all in-person visits with telehealth sessions
  correct_answer: B
  explanation_correct: EHRs reduce test duplication, decrease delays, and improve accuracy by making information available
    electronically to authorized providers.
  explanation_incorrect_A: EHRs support physicians — they do not replace them.
  explanation_incorrect_C: EHRs provide information to providers; they do not enable patient self-diagnosis.
  explanation_incorrect_D: EHRs are digital records, not telehealth platforms.
- question_id: Q-DAT-073
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-025
  question: What is a key characteristic of certified EHR technology?
  options:
    A: It stores data in handwritten format for authenticity
    B: It stores patient data in a structured format for easy retrieval, transfer, and use
    C: It restricts data access to a single provider at a time
    D: It requires data to be printed on paper before it can be shared
  correct_answer: B
  explanation_correct: Certified EHR technology stores data in a structured format that supports retrieval, transfer, and
    care decisions.
  explanation_incorrect_A: Certified EHRs store data digitally in a structured format, not handwritten.
  explanation_incorrect_C: EHRs are designed to support access by multiple authorized providers.
  explanation_incorrect_D: Certified EHRs enable electronic sharing without printing.
- question_id: Q-DAT-074
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-004
  question: What type of standards does the HIPAA Privacy Rule establish?
  options:
    A: Local hospital guidelines for visitor policies
    B: National standards for protecting individually identifiable health information
    C: International guidelines for pharmaceutical manufacturing
    D: State-level regulations for medical school accreditation
  correct_answer: B
  explanation_correct: The Privacy Rule establishes national standards for the protection of individually identifiable health
    information.
  explanation_incorrect_A: The Privacy Rule sets national standards, not local hospital guidelines.
  explanation_incorrect_C: HIPAA is a U.S. law, not an international pharmaceutical standard.
  explanation_incorrect_D: Medical school accreditation is handled by separate organizations, not the HIPAA Privacy Rule.
- question_id: Q-DAT-075
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-011
  question: Which of the following is an example of a physical safeguard under the HIPAA Security Rule?
  options:
    A: Assigning unique login credentials to each employee
    B: Conducting annual risk assessments
    C: Controlling physical access to facilities where ePHI is stored
    D: Encrypting emails that contain patient data
  correct_answer: C
  explanation_correct: Physical safeguards protect the physical facilities, workstations, and devices where ePHI is stored
    or accessed.
  explanation_incorrect_A: Unique login credentials are a technical safeguard.
  explanation_incorrect_B: Risk assessments are an administrative safeguard.
  explanation_incorrect_D: Email encryption is a technical safeguard.
- question_id: Q-DAT-076
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-012
  question: The HIPAA Breach Notification Rule requires covered entities to notify affected individuals within what timeframe?
  options:
    A: Immediately upon suspecting a breach
    B: Within 24 hours of discovering a breach
    C: Without unreasonable delay and no later than 60 days after discovery
    D: Within one calendar year of the breach
  correct_answer: C
  explanation_correct: The rule requires notification without unreasonable delay and no later than 60 days after discovering
    the breach.
  explanation_incorrect_A: The rule specifies "without unreasonable delay" but allows up to 60 days, not immediate notification.
  explanation_incorrect_B: 24 hours is not the standard under the Breach Notification Rule.
  explanation_incorrect_D: One calendar year far exceeds the maximum allowed notification period.
- question_id: Q-DAT-077
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-023
  question: How does an EHR differ from a traditional paper chart?
  options:
    A: An EHR is a digital version of a patient's medical history maintained over time
    B: An EHR contains less information than a paper chart
    C: An EHR can only be accessed by the patient, not the provider
    D: An EHR must be printed and filed in a cabinet to be valid
  correct_answer: A
  explanation_correct: An EHR is a digital version of a patient's medical history maintained by the provider over time, unlike
    a paper chart.
  explanation_incorrect_B: EHRs typically contain more comprehensive and accessible data than paper charts.
  explanation_incorrect_C: EHRs are maintained by and accessible to authorized providers.
  explanation_incorrect_D: EHRs are valid in their electronic form and do not require printing.
- question_id: Q-DAT-078
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-014
  question: Which of the following best describes the purpose of ICD codes in the healthcare system?
  options:
    A: To calculate provider salaries based on patient volume
    B: To provide a standardized way to classify diagnoses and inpatient procedures
    C: To determine which patients qualify for health insurance
    D: To rank hospitals by quality of care
  correct_answer: B
  explanation_correct: ICD codes provide a standardized system for classifying medical diagnoses and inpatient procedures
    on claims and records.
  explanation_incorrect_A: Provider salaries are not determined by ICD codes.
  explanation_incorrect_C: Insurance eligibility is determined by plan rules, not ICD codes.
  explanation_incorrect_D: Hospital rankings are not based on ICD codes.
- question_id: Q-DAT-079
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-005
  question: Which scenario correctly applies the minimum necessary standard?
  options:
    A: A billing clerk accesses only the diagnosis codes and procedure codes needed to process a claim
    B: A receptionist reads a patient's full psychiatric notes to schedule an appointment
    C: An IT technician reviews all patient records to test a new software feature
    D: A hospital administrator shares complete patient files with a marketing agency
  correct_answer: A
  explanation_correct: Accessing only the specific data elements needed for the task (billing) is a proper application of
    the minimum necessary standard.
  explanation_incorrect_B: A receptionist does not need psychiatric notes to schedule an appointment — this exceeds the minimum
    necessary.
  explanation_incorrect_C: Accessing all patient records for software testing is not limited to the minimum necessary.
  explanation_incorrect_D: Sharing complete patient files with a marketing agency violates the minimum necessary standard.
- question_id: Q-DAT-080
  type: MCQ
  pillar: data
  tutorial_id: T-DATA-01
  fact_id: FACT-DAT-024
  question: Which of the following is a way that EHRs help reduce delays in patient treatment?
  options:
    A: By requiring patients to carry paper copies of their records to every appointment
    B: By making health information available electronically to authorized providers
    C: By limiting the number of providers who can treat a patient
    D: By replacing all diagnostic testing with automated algorithms
  correct_answer: B
  explanation_correct: EHRs reduce treatment delays by making health information available electronically to authorized providers
    when and where it is needed.
  explanation_incorrect_A: EHRs eliminate the need for patients to carry paper records, not reinforce it.
  explanation_incorrect_C: EHRs improve information access; they do not restrict which providers can treat a patient.
  explanation_incorrect_D: EHRs support care decisions but do not replace diagnostic testing.
- question_id: Q-CRS-016
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-001
  question: In the basic claims flow, the provider submits a claim to the payor after the patient receives care.
  correct_answer: 'True'
  explanation_correct: The standard flow is patient receives care, then the provider submits a claim to the payor for reimbursement.
  explanation_incorrect: This statement accurately describes the basic claims flow sequence.
- question_id: Q-CRS-017
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-002
  question: Providers may submit claims to payors using any proprietary format they choose, as long as the claim data is accurate.
  correct_answer: 'False'
  explanation_correct: HIPAA requires providers to submit claims electronically using HIPAA-standard transaction formats,
    not proprietary formats.
  explanation_incorrect: This statement is false. HIPAA mandates standardized electronic formats for claim submissions.
- question_id: Q-CRS-018
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-003
  question: Automated edits performed on incoming claims check for completeness, valid values, duplicate submissions, and
    beneficiary eligibility.
  correct_answer: 'True'
  explanation_correct: Before adjudication, payors run automated edits that check for completeness, valid values, data consistency,
    duplicate submissions, and provider/beneficiary eligibility.
  explanation_incorrect: This statement correctly describes the automated checks performed on incoming claims.
- question_id: Q-CRS-019
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-004
  question: A rejected claim and a denied claim mean the same thing in healthcare billing.
  correct_answer: 'False'
  explanation_correct: A rejected claim is returned to the provider for correction and can be resubmitted, while a denied
    claim means the service is not covered or does not meet policy requirements.
  explanation_incorrect: This statement is false. Rejected claims are returned for correction; denied claims are determined
    to be not covered or not meeting policy.
- question_id: Q-CRS-020
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-006
  question: Since January 1, 2013, HIPAA operating rules require health plans to respond to eligibility inquiries in real
    time.
  correct_answer: 'True'
  explanation_correct: HIPAA operating rules effective January 1, 2013, require health plans to respond to electronic eligibility
    inquiries in real time, including deductible, co-pay, and coinsurance information.
  explanation_incorrect: This statement correctly reflects the 2013 HIPAA operating rule requirement for real-time eligibility
    responses.
- question_id: Q-CRS-021
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-009
  question: A payor will approve a claim as long as a valid procedure code is present, regardless of the diagnosis code submitted.
  correct_answer: 'False'
  explanation_correct: Payors use the diagnosis code to determine medical necessity. If the diagnosis does not support the
    procedure according to coverage policy, the claim may be denied.
  explanation_incorrect: This statement is false. The diagnosis code must support the procedure for the claim to be considered
    medically necessary.
- question_id: Q-CRS-022
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-011
  question: Patients should compare the Explanation of Benefits (EOB) they receive from their health plan to the provider's
    actual bill to check for accuracy.
  correct_answer: 'True'
  explanation_correct: An EOB is a summary of how the plan processed the claim, and patients should compare it to the provider's
    bill to verify the amounts are correct.
  explanation_incorrect: This statement accurately describes best practice for patients reviewing their EOBs.
- question_id: Q-CRS-023
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-012
  question: The Electronic Remittance Advice (ERA) is sent from the provider to the payor to explain why a claim was submitted.
  correct_answer: 'False'
  explanation_correct: The ERA (HIPAA 835 transaction) is sent from the payor to the provider, not the other way around. It
    details payment amounts, adjustments, and denial reasons.
  explanation_incorrect: This statement reverses the direction of the ERA. The payor sends it to the provider after adjudication.
- question_id: Q-CRS-024
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-013
  question: For in-network services, a provider generally cannot bill the patient beyond the allowed amount set by the health
    plan.
  correct_answer: 'True'
  explanation_correct: In-network providers have agreed to accept the health plan's allowed amount as the maximum charge.
    The patient may owe cost-sharing (co-pay, coinsurance, deductible) but not charges above the allowed amount.
  explanation_incorrect: This statement correctly describes in-network billing limits tied to the allowed amount.
- question_id: Q-CRS-025
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-016
  question: A provider's NPI number changes whenever the provider moves to a new state or changes specialties.
  correct_answer: 'False'
  explanation_correct: The NPI is permanent and does not change based on location, specialty, or any other provider attribute.
    It is a permanent, intelligence-free identifier.
  explanation_incorrect: This statement is false. The NPI is permanent and stays with the provider regardless of changes in
    location or specialty.
- question_id: Q-CRS-026
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-019
  question: Protected health information (PHI) includes any data that relates to a person's health condition, care received,
    or payment for care, and that can identify the individual.
  correct_answer: 'True'
  explanation_correct: PHI is defined as individually identifiable health information that relates to a person's health condition,
    care received, or payment for that care.
  explanation_incorrect: This statement accurately defines PHI under HIPAA.
- question_id: Q-CRS-027
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-020
  question: Under HIPAA, a covered entity must always obtain written patient authorization before sharing PHI for treatment
    purposes.
  correct_answer: 'False'
  explanation_correct: Under HIPAA, covered entities may share PHI without patient authorization for treatment, payment, and
    health care operations (TPO).
  explanation_incorrect: This statement is false. HIPAA allows sharing PHI for TPO purposes without patient authorization.
- question_id: Q-CRS-028
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-022
  question: Under HIPAA, patients have the right to access and obtain copies of their own health records from a covered entity.
  correct_answer: 'True'
  explanation_correct: HIPAA gives patients the right to access and obtain copies of their health records from any covered
    entity within 30 days of request.
  explanation_incorrect: This statement correctly describes a patient right under HIPAA.
- question_id: Q-CRS-029
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-014
  question: A clearinghouse sends claims directly to patients for review before forwarding them to the health plan.
  correct_answer: 'False'
  explanation_correct: A clearinghouse is an intermediary between providers and health plans. It converts transactions into
    HIPAA-standard formats and forwards them to the health plan — patients are not part of this process.
  explanation_incorrect: This statement is false. Clearinghouses forward claims to health plans, not to patients.
- question_id: Q-CRS-030
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-024
  question: ASC X12 Version 5010 is the current HIPAA-adopted standard format for electronic healthcare transactions.
  correct_answer: 'True'
  explanation_correct: ASC X12 Version 5010 is the HIPAA-adopted standard used by providers, payors, and clearinghouses nationwide
    for electronic transactions.
  explanation_incorrect: This statement correctly identifies the current HIPAA standard transaction format.
- question_id: Q-CRS-031
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-023
  question: HIPAA mandates standard electronic formats for claims submission but does not standardize eligibility verification
    or remittance advice transactions.
  correct_answer: 'False'
  explanation_correct: HIPAA's Administrative Simplification provisions standardize multiple transaction types including claims
    (837), remittance advice (835), eligibility verification (270/271), claim status (276/277), and referral authorization
    (278).
  explanation_incorrect: This statement is false. HIPAA standardizes many transaction types beyond claims submission.
- question_id: Q-CRS-032
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-005
  question: Providers can verify a patient's insurance eligibility before providing care by sending an electronic eligibility
    inquiry to the health plan.
  correct_answer: 'True'
  explanation_correct: Providers can send a HIPAA 270 transaction to the health plan before or at the time of service to verify
    coverage and benefits.
  explanation_incorrect: This statement accurately describes how providers verify eligibility electronically.
- question_id: Q-CRS-033
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-025
  question: Each health plan requires a unique, plan-specific data format for electronic claims, making it impossible for
    one provider to submit to multiple plans using the same format.
  correct_answer: 'False'
  explanation_correct: Standardized transaction formats allow any provider to submit a claim to any health plan using the
    same data structure, enabling interoperability across the healthcare system.
  explanation_incorrect: This statement is false. HIPAA standardization ensures one common format works across all health
    plans.
- question_id: Q-CRS-034
  type: TF
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-010
  question: An Explanation of Benefits (EOB) shows provider charges, allowed charges, the amount the insurer paid, and what
    the patient owes.
  correct_answer: 'True'
  explanation_correct: The EOB is a document sent by the health plan to the patient after a claim is processed, showing all
    of these amounts.
  explanation_incorrect: This statement correctly describes the key information included in an EOB.
- question_id: Q-CRS-035
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-001
  question: Who initiates a claim in the basic healthcare claims flow?
  options:
    A: The patient submits the claim to the health plan
    B: The provider submits the claim to the payor after delivering care
    C: The payor generates the claim automatically when care is delivered
    D: The clearinghouse creates the claim on behalf of the patient
  correct_answer: B
  explanation_correct: In the standard claims flow, the provider submits a claim to the payor after the patient receives care.
  explanation_incorrect_A: Patients do not typically submit claims; the provider handles claim submission.
  explanation_incorrect_C: Payors do not automatically generate claims; they receive and process claims submitted by providers.
  explanation_incorrect_D: Clearinghouses translate and forward claims but do not create them on behalf of patients.
- question_id: Q-CRS-036
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-002
  question: What method do providers primarily use to submit claims to payors under HIPAA?
  options:
    A: Paper forms mailed through the postal service
    B: Electronic submission using HIPAA-standard transaction formats
    C: Verbal communication over the telephone
    D: Faxed copies of the patient's medical record
  correct_answer: B
  explanation_correct: HIPAA requires providers to submit claims electronically using standard transaction formats.
  explanation_incorrect_A: While paper claims still exist in limited cases, HIPAA promotes and often requires electronic submission.
  explanation_incorrect_C: Claims are not submitted verbally.
  explanation_incorrect_D: Faxing medical records is not the standard method of claim submission under HIPAA.
- question_id: Q-CRS-037
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-003
  question: Which of the following is checked during the automated edits performed on an incoming claim?
  options:
    A: The provider's personal credit score
    B: Whether the patient has paid all previous medical bills
    C: Completeness of claim data, valid values, and duplicate submissions
    D: Whether the patient's employer has approved the visit
  correct_answer: C
  explanation_correct: Automated edits check for completeness, valid values, data consistency, duplicate submissions, and
    provider/beneficiary eligibility.
  explanation_incorrect_A: A provider's credit score is not part of claim processing.
  explanation_incorrect_B: The patient's prior bill payment history is not checked during automated claim edits.
  explanation_incorrect_D: Employer approval is not part of the automated claim edit process.
- question_id: Q-CRS-038
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-003
  question: What happens to a claim before it reaches the adjudication stage?
  options:
    A: It is sent to the patient for approval
    B: It undergoes automated edits that check for completeness and eligibility
    C: It is published in a public database for transparency
    D: It is forwarded to a government agency for pre-approval
  correct_answer: B
  explanation_correct: Before adjudication, automated edits verify completeness, valid values, data consistency, duplicate
    status, and beneficiary eligibility.
  explanation_incorrect_A: Patients do not approve claims before adjudication.
  explanation_incorrect_C: Claims are not published in any public database.
  explanation_incorrect_D: Claims are not routinely forwarded to a government agency for pre-approval.
- question_id: Q-CRS-039
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-004
  question: What does it mean when a healthcare claim is "rejected"?
  options:
    A: The payor has determined the service is not covered under the patient's plan
    B: The claim is returned to the provider for correction and may be resubmitted
    C: The patient must appeal the decision to a government agency
    D: The provider must refund the patient in full
  correct_answer: B
  explanation_correct: A rejected claim is returned to the provider for correction, typically because of errors or missing
    information, and can be resubmitted.
  explanation_incorrect_A: This describes a denied claim, not a rejected one.
  explanation_incorrect_C: A rejected claim does not require a government appeal; it requires correction and resubmission.
  explanation_incorrect_D: Rejection does not require a refund; the provider corrects and resubmits the claim.
- question_id: Q-CRS-040
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-004
  question: What is one reason a claim might be denied after adjudication?
  options:
    A: The claim form was submitted using the correct HIPAA format
    B: The service is not covered under the patient's health plan
    C: The provider included a valid NPI on the claim
    D: The patient's eligibility was verified before the visit
  correct_answer: B
  explanation_correct: A claim may be denied if the service is not covered or does not meet policy requirements.
  explanation_incorrect_A: Using the correct format supports claim processing, not denial.
  explanation_incorrect_C: Including a valid NPI is required and would not cause a denial.
  explanation_incorrect_D: Verified eligibility supports processing, not denial.
- question_id: Q-CRS-041
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-005
  question: When can a provider send an eligibility inquiry (270 transaction) to a health plan?
  options:
    A: Only after the claim has been denied
    B: Only during the annual open enrollment period
    C: Before or at the time of service
    D: Only after the patient has been discharged from the hospital
  correct_answer: C
  explanation_correct: Providers can verify eligibility before or at the time of service by sending a HIPAA 270 transaction
    to the health plan.
  explanation_incorrect_A: Eligibility verification is typically done before or at the time of service, not only after a denial.
  explanation_incorrect_B: Eligibility inquiries can be sent at any time, not just during open enrollment.
  explanation_incorrect_D: Checking eligibility after discharge would be too late for most purposes.
- question_id: Q-CRS-042
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-006
  question: What type of information is included in a real-time eligibility response from a health plan?
  options:
    A: The provider's tax return information
    B: Deductible, co-pay, and coinsurance details
    C: A list of all claims the patient has ever filed
    D: The patient's complete medical history
  correct_answer: B
  explanation_correct: Since 2013, HIPAA operating rules require real-time responses that include deductible, co-pay, and
    coinsurance information.
  explanation_incorrect_A: Tax return information is not part of eligibility responses.
  explanation_incorrect_C: A full claims history is not returned in an eligibility response.
  explanation_incorrect_D: Medical history is not part of an eligibility verification response.
- question_id: Q-CRS-043
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-007
  question: Why must every healthcare claim pair a diagnosis code with a procedure code?
  options:
    A: To satisfy the provider's internal record-keeping requirements only
    B: To link the clinical reason for care to the service performed, supporting the payor's reimbursement decision
    C: To allow the patient to choose their preferred treatment option
    D: To ensure the clearinghouse can assign an NPI to the claim
  correct_answer: B
  explanation_correct: The diagnosis code (ICD-10-CM) explains why care was needed, and the procedure code (CPT/HCPCS) describes
    the service performed; together they link clinical documentation to reimbursement.
  explanation_incorrect_A: While codes appear in records, the pairing requirement is driven by billing and reimbursement,
    not just internal record-keeping.
  explanation_incorrect_C: Code pairing is about billing, not patient treatment choice.
  explanation_incorrect_D: The clearinghouse does not assign NPIs based on code pairing.
- question_id: Q-CRS-044
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-008
  question: What happens when a provider submits a claim without a valid ICD-10-CM diagnosis code?
  options:
    A: The payor processes the claim using a default diagnosis code
    B: The claim is returned to the provider as incomplete and will not be processed
    C: The clearinghouse assigns a diagnosis code automatically
    D: The patient is contacted to provide the diagnosis information
  correct_answer: B
  explanation_correct: A claim without a valid ICD-10-CM diagnosis code is returned as incomplete and will not be processed
    for payment.
  explanation_incorrect_A: Payors do not assign default diagnosis codes to incomplete claims.
  explanation_incorrect_C: Clearinghouses translate formats but do not add clinical codes to claims.
  explanation_incorrect_D: Patients are not responsible for providing diagnosis codes.
- question_id: Q-CRS-045
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-009
  question: How do payors use the diagnosis code on a claim?
  options:
    A: To assign the patient a primary care physician
    B: To determine whether the procedure is medically necessary for the reported condition
    C: To calculate the provider's annual income
    D: To schedule the patient's next appointment
  correct_answer: B
  explanation_correct: Payors use the diagnosis code to determine medical necessity — whether the diagnosis supports the procedure
    according to coverage policy.
  explanation_incorrect_A: Diagnosis codes are not used to assign physicians.
  explanation_incorrect_C: Diagnosis codes do not relate to provider income calculations.
  explanation_incorrect_D: Scheduling is not a function of diagnosis codes on claims.
- question_id: Q-CRS-046
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-010
  question: Who receives the Explanation of Benefits (EOB)?
  options:
    A: The clearinghouse
    B: The provider's billing department
    C: The patient (or subscriber)
    D: The employer's human resources department
  correct_answer: C
  explanation_correct: The EOB is sent by the health plan to the patient after a claim is processed.
  explanation_incorrect_A: Clearinghouses do not receive EOBs.
  explanation_incorrect_B: Providers receive the ERA (835), not the EOB. The EOB goes to the patient.
  explanation_incorrect_D: EOBs go to the patient, not the employer.
- question_id: Q-CRS-047
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-010
  question: Which of the following pieces of information appears on an Explanation of Benefits (EOB)?
  options:
    A: The provider's NPI application date
    B: The allowed charges and the amount the insurer paid
    C: The patient's complete prescription history
    D: The clearinghouse's processing fee
  correct_answer: B
  explanation_correct: An EOB shows provider charges, allowed charges, the amount the insurer paid, and what the patient owes.
  explanation_incorrect_A: NPI application information does not appear on an EOB.
  explanation_incorrect_C: Prescription history is not included on an EOB for a specific claim.
  explanation_incorrect_D: Clearinghouse fees are not shown on a patient's EOB.
- question_id: Q-CRS-048
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-012
  question: Who sends the Electronic Remittance Advice (ERA) and who receives it?
  options:
    A: The patient sends it to the provider
    B: The provider sends it to the payor
    C: The payor sends it to the provider
    D: The clearinghouse sends it to the patient
  correct_answer: C
  explanation_correct: After adjudication, the payor sends an ERA (HIPAA 835 transaction) to the provider detailing payment,
    adjustments, and denial reasons.
  explanation_incorrect_A: Patients are not involved in sending ERAs.
  explanation_incorrect_B: The provider submits claims, not ERAs. The ERA flows in the opposite direction.
  explanation_incorrect_D: The ERA goes to the provider, not the patient.
- question_id: Q-CRS-049
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-012
  question: What information does an Electronic Remittance Advice (ERA) include?
  options:
    A: The patient's treatment plan and medication list
    B: Payment amount, adjustments, and reasons for any denials
    C: The provider's malpractice insurance details
    D: A referral to a specialist for follow-up care
  correct_answer: B
  explanation_correct: The ERA details the payment amount, adjustments, and reasons for any denials after claim adjudication.
  explanation_incorrect_A: Treatment plans and medication lists are clinical documents, not part of the ERA.
  explanation_incorrect_C: Malpractice insurance details are not included in an ERA.
  explanation_incorrect_D: Specialist referrals are not part of the ERA.
- question_id: Q-CRS-050
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-013
  question: What is the "allowed amount" in healthcare reimbursement?
  options:
    A: The total charge the provider bills before insurance processing
    B: The maximum amount a health plan will pay for a covered service
    C: The amount the patient pays as a monthly premium
    D: The amount charged by the clearinghouse for processing the claim
  correct_answer: B
  explanation_correct: The allowed amount is the maximum the health plan will pay for a covered service. The provider may
    bill the patient for cost-sharing but generally not above the allowed amount for in-network services.
  explanation_incorrect_A: The total billed charge is different from the allowed amount; the billed amount is often higher.
  explanation_incorrect_C: Monthly premiums are separate from the allowed amount for individual services.
  explanation_incorrect_D: Clearinghouse fees are not related to the allowed amount.
- question_id: Q-CRS-051
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-013
  question: After the health plan pays its share of the allowed amount, what may the patient still owe for an in-network service?
  options:
    A: The full billed charge from the provider
    B: Co-pay, coinsurance, or deductible amounts
    C: The clearinghouse processing fee
    D: A penalty for using an in-network provider
  correct_answer: B
  explanation_correct: The patient may owe cost-sharing amounts such as co-pay, coinsurance, or deductible, but not charges
    above the allowed amount for in-network services.
  explanation_incorrect_A: For in-network services, the patient's responsibility is limited to cost-sharing within the allowed
    amount, not the full billed charge.
  explanation_incorrect_C: Patients do not pay clearinghouse fees.
  explanation_incorrect_D: There is no penalty for using in-network providers; in fact, costs are typically lower in-network.
- question_id: Q-CRS-052
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-014
  question: What does a healthcare clearinghouse do with claims it receives from providers?
  options:
    A: Diagnoses the patient's condition and updates the claim
    B: Converts the claims into HIPAA-standard electronic formats and forwards them to the health plan
    C: Stores the claims permanently and does not forward them
    D: Returns the claims to the patient for verification
  correct_answer: B
  explanation_correct: A clearinghouse receives claims from providers, converts them into HIPAA-standard formats, and forwards
    them to the appropriate health plan.
  explanation_incorrect_A: Clearinghouses handle data formatting, not clinical diagnosis.
  explanation_incorrect_C: Clearinghouses forward claims to health plans; they do not permanently hold them.
  explanation_incorrect_D: Claims are forwarded to health plans, not returned to patients.
- question_id: Q-CRS-053
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-014
  question: Why might a provider use a clearinghouse instead of submitting claims directly to each health plan?
  options:
    A: Clearinghouses provide medical care that the provider cannot
    B: Clearinghouses convert claims into the correct standard format for each plan, simplifying submission
    C: Clearinghouses are required to approve all claims before payors can process them
    D: Clearinghouses eliminate the need for diagnosis and procedure codes
  correct_answer: B
  explanation_correct: Clearinghouses serve as intermediaries that translate and format claims into HIPAA-standard formats,
    making it easier for providers to submit to multiple health plans.
  explanation_incorrect_A: Clearinghouses do not provide medical care.
  explanation_incorrect_C: Clearinghouses translate formats but do not approve claims.
  explanation_incorrect_D: Clearinghouses do not remove the requirement for clinical codes.
- question_id: Q-CRS-054
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-015
  question: Which of the following are the three types of HIPAA covered entities?
  options:
    A: Hospitals, pharmacies, and laboratories
    B: Health plans, health care providers who transmit transactions electronically, and clearinghouses
    C: Medicare, Medicaid, and commercial insurers
    D: Patients, employers, and government agencies
  correct_answer: B
  explanation_correct: The three HIPAA covered entity types are health plans, health care providers who transmit transactions
    electronically, and clearinghouses.
  explanation_incorrect_A: These are specific types of providers, not the three covered entity categories.
  explanation_incorrect_C: These are types of health plans, not the three covered entity categories.
  explanation_incorrect_D: Patients, employers, and government agencies are not the three covered entity types under HIPAA.
- question_id: Q-CRS-055
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-017
  question: What does it mean that the NPI is "intelligence-free"?
  options:
    A: It does not require a computer to look up
    B: It carries no information about the provider's specialty, location, or type
    C: It is automatically generated without human review
    D: It expires and must be renewed every 10 years
  correct_answer: B
  explanation_correct: The NPI is intelligence-free, meaning the number itself carries no information about the provider's
    location, specialty, or type — it is purely a unique identifier.
  explanation_incorrect_A: The NPI has 10 digits, not 5.
  explanation_incorrect_B: The NPI has 10 digits, not 8.
  explanation_incorrect_D: The NPI has 10 digits, not 12.
  explanation_incorrect:
    A: Intelligence-free refers to the data encoded in the number, not how it is accessed.
    C: The NPI application involves a review process; intelligence-free refers to the number format.
    D: The NPI is permanent and does not expire.
- question_id: Q-CRS-056
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-016
  question: On which types of transactions must the NPI appear?
  options:
    A: Only on paper claims
    B: Only on claims for Medicare patients
    C: All electronic claims, eligibility inquiries, and other HIPAA transactions
    D: Only on transactions processed by clearinghouses
  correct_answer: C
  explanation_correct: The NPI must appear on all electronic claims, eligibility inquiries, and other HIPAA transactions.
  explanation_incorrect_A: The NPI is required on electronic HIPAA transactions, not limited to paper claims.
  explanation_incorrect_B: The NPI is required for all HIPAA-covered transactions, not only Medicare.
  explanation_incorrect_D: The NPI requirement applies to all HIPAA transactions, not just those routed through clearinghouses.
- question_id: Q-CRS-057
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-017
  question: What does it mean that the NPI is "intelligence-free"?
  options:
    A: The NPI cannot be used to look up a provider in any database
    B: The number itself carries no information about the provider's location, specialty, or type
    C: The NPI is randomly regenerated each year
    D: Only providers without board certifications receive an NPI
  correct_answer: B
  explanation_correct: Intelligence-free means the NPI number itself contains no embedded information about the provider —
    it serves purely as a unique identifier.
  explanation_incorrect_A: The NPI can be looked up in the NPPES database; "intelligence-free" refers to the number itself,
    not its searchability.
  explanation_incorrect_C: The NPI is permanent; it is not regenerated.
  explanation_incorrect_D: All HIPAA-covered providers receive an NPI regardless of certifications.
- question_id: Q-CRS-058
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-018
  question: Which of the following entities is NOT a HIPAA covered entity?
  options:
    A: A commercial health insurance company
    B: A hospital that submits claims electronically
    C: A healthcare clearinghouse
    D: A life insurance company that does not handle health information
  correct_answer: D
  explanation_correct: HIPAA covered entities are health plans, health care providers who transmit transactions electronically,
    and clearinghouses. A life insurance company that does not handle health information is not a covered entity.
  explanation_incorrect_A: Health insurance companies are health plans and are covered entities under HIPAA.
  explanation_incorrect_B: Hospitals that transmit electronic transactions are covered entities.
  explanation_incorrect_C: Clearinghouses are one of the three types of covered entities.
- question_id: Q-CRS-059
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-019
  question: Which of the following is an example of protected health information (PHI)?
  options:
    A: A patient's name linked to their diagnosis in a medical record
    B: Aggregate hospital admission statistics with no individual identifiers
    C: A provider's office address published on their website
    D: The total revenue of a health plan reported in annual filings
  correct_answer: A
  explanation_correct: PHI is any data relating to a person's health condition, care, or payment for care that can identify
    the individual — such as a name linked to a diagnosis.
  explanation_incorrect_B: Aggregate data without individual identifiers is not PHI.
  explanation_incorrect_C: A provider's public business address is not PHI.
  explanation_incorrect_D: A health plan's revenue figures are not individually identifiable health information.
- question_id: Q-CRS-060
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-020
  question: Under HIPAA, which set of purposes allows a covered entity to share PHI without patient authorization?
  options:
    A: Marketing, fundraising, and research
    B: Treatment, payment, and health care operations (TPO)
    C: Employment, insurance underwriting, and law enforcement
    D: Education, media reporting, and public relations
  correct_answer: B
  explanation_correct: HIPAA allows covered entities to share PHI without patient authorization for treatment, payment, and
    health care operations (TPO).
  explanation_incorrect_A: Marketing and fundraising generally require patient authorization under HIPAA.
  explanation_incorrect_C: These are not the TPO purposes recognized by HIPAA for sharing PHI without authorization.
  explanation_incorrect_D: Education and media reporting are not TPO purposes under HIPAA.
- question_id: Q-CRS-061
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-021
  question: What does HIPAA's minimum necessary standard require?
  options:
    A: That covered entities use the minimum number of staff to handle PHI
    B: That PHI disclosures be limited to the smallest amount of information needed for the purpose
    C: That patients provide the minimum amount of personal information at check-in
    D: That providers use the fewest possible procedure codes on a claim
  correct_answer: B
  explanation_correct: The minimum necessary standard requires covered entities to limit PHI use and disclosure to the smallest
    amount needed to accomplish the intended purpose.
  explanation_incorrect_A: The standard applies to information disclosed, not staffing levels.
  explanation_incorrect_C: The standard governs how covered entities handle PHI, not what patients provide at check-in.
  explanation_incorrect_D: The standard is about PHI disclosure, not the number of procedure codes on a claim.
- question_id: Q-CRS-062
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-021
  question: A hospital sends a patient's complete medical record to an insurance company that only requested lab results for
    a specific claim. Which HIPAA principle does this violate?
  options:
    A: The right of access rule
    B: The minimum necessary standard
    C: The breach notification rule
    D: The TPO exception
  correct_answer: B
  explanation_correct: Sending the complete medical record when only lab results were needed violates the minimum necessary
    standard, which requires limiting PHI to the smallest amount needed.
  explanation_incorrect_A: The right of access applies to patients requesting their own records.
  explanation_incorrect_C: The breach notification rule covers unauthorized disclosures; this is a minimum necessary violation.
  explanation_incorrect_D: TPO is a category of permitted uses, not a principle about limiting the amount of information shared.
- question_id: Q-CRS-063
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-022
  question: Within how many days must a covered entity provide a patient with copies of their health records after receiving
    a request?
  options:
    A: 7 days
    B: 14 days
    C: 30 days
    D: 90 days
  correct_answer: C
  explanation_correct: Under HIPAA, covered entities must provide patients with access to their health records within 30 days
    of request.
  explanation_incorrect_A: The HIPAA requirement is 30 days, not 7.
  explanation_incorrect_B: The HIPAA requirement is 30 days, not 14.
  explanation_incorrect_D: The HIPAA requirement is 30 days, not 90.
- question_id: Q-CRS-064
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-022
  question: Under HIPAA, patients have the right to do which of the following with their health records?
  options:
    A: Delete any records they disagree with
    B: Access their records and request corrections
    C: Sell their records to third-party researchers
    D: Prevent their provider from documenting any care
  correct_answer: B
  explanation_correct: Patients have the right under HIPAA to access and obtain copies of their health records and to request
    corrections.
  explanation_incorrect_A: Patients can request corrections, not unilateral deletions.
  explanation_incorrect_C: HIPAA provides access rights, not the right to sell records.
  explanation_incorrect_D: Patients cannot prevent providers from maintaining required clinical documentation.
- question_id: Q-CRS-065
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-023
  question: Which HIPAA standard transaction is used for claims submission?
  options:
    A: 835
    B: 837
    C: 270
    D: 278
  correct_answer: B
  explanation_correct: The 837 transaction is the HIPAA standard for electronic claims submission.
  explanation_incorrect_A: The 835 is the remittance advice (payment) transaction.
  explanation_incorrect_C: The 270 is the eligibility inquiry transaction.
  explanation_incorrect_D: The 278 is the referral authorization transaction.
- question_id: Q-CRS-066
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-023
  question: Which HIPAA standard transaction is used for remittance advice (payment details)?
  options:
    A: 837
    B: 270
    C: 835
    D: 276
  correct_answer: C
  explanation_correct: The 835 transaction is the HIPAA standard for electronic remittance advice, which details payment information
    from the payor to the provider.
  explanation_incorrect_A: The 837 is used for claims submission, not remittance advice.
  explanation_incorrect_B: The 270 is used for eligibility inquiries.
  explanation_incorrect_D: The 276 is used for claim status inquiries.
- question_id: Q-CRS-067
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-023
  question: Which pair of HIPAA transactions covers eligibility verification?
  options:
    A: 837 and 835
    B: 270 and 271
    C: 276 and 277
    D: 278 and 279
  correct_answer: B
  explanation_correct: The 270 transaction is the eligibility inquiry, and the 271 is the eligibility response.
  explanation_incorrect_A: The 837 is for claims submission and the 835 is for remittance advice.
  explanation_incorrect_C: The 276/277 pair covers claim status inquiries and responses.
  explanation_incorrect_D: The 278 is for referral authorization; there is no standard 279 transaction.
- question_id: Q-CRS-068
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-023
  question: Which HIPAA transaction pair is used for claim status inquiries and responses?
  options:
    A: 270 and 271
    B: 837 and 835
    C: 276 and 277
    D: 278 and 835
  correct_answer: C
  explanation_correct: The 276 transaction is the claim status inquiry, and the 277 is the claim status response.
  explanation_incorrect_A: The 270/271 pair is used for eligibility verification, not claim status.
  explanation_incorrect_B: The 837 is for claims submission and the 835 is for remittance advice.
  explanation_incorrect_D: The 278 is for referral authorization, and the 835 is for remittance advice; they are not a paired
    transaction.
- question_id: Q-CRS-069
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-023
  question: What is the HIPAA 278 transaction used for?
  options:
    A: Claims submission
    B: Remittance advice
    C: Referral authorization
    D: Eligibility verification
  correct_answer: C
  explanation_correct: The 278 transaction is the HIPAA standard for referral authorization requests and responses.
  explanation_incorrect_A: Claims submission uses the 837 transaction.
  explanation_incorrect_B: Remittance advice uses the 835 transaction.
  explanation_incorrect_D: Eligibility verification uses the 270/271 transaction pair.
- question_id: Q-CRS-070
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-024
  question: Which organizations use the ASC X12 Version 5010 standard?
  options:
    A: Only Medicare and Medicaid
    B: Providers, payors, and clearinghouses nationwide
    C: Only hospitals with more than 100 beds
    D: Only clearinghouses that process government claims
  correct_answer: B
  explanation_correct: ASC X12 Version 5010 is used by providers, payors, and clearinghouses nationwide as the HIPAA-adopted
    standard for electronic transactions.
  explanation_incorrect_A: The standard applies to all HIPAA-covered entities, not just Medicare and Medicaid.
  explanation_incorrect_C: The standard applies to all covered providers, regardless of size.
  explanation_incorrect_D: All clearinghouses use this standard, not just those processing government claims.
- question_id: Q-CRS-071
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-025
  question: What is the primary benefit of standardized electronic transaction formats in healthcare?
  options:
    A: They allow patients to submit their own claims directly to the government
    B: They enable any provider to submit a claim to any health plan using the same data structure
    C: They eliminate the need for diagnosis and procedure codes
    D: They allow payors to set their own unique claim formats
  correct_answer: B
  explanation_correct: Standardized formats enable interoperability — any provider can communicate with any health plan using
    the same data structure.
  explanation_incorrect_A: Patients typically do not submit claims; providers do.
  explanation_incorrect_C: Standardized formats still require diagnosis and procedure codes.
  explanation_incorrect_D: The purpose of standardization is a common format, not plan-specific ones.
- question_id: Q-CRS-072
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-001
  question: In the basic claims flow, what is the payor's role?
  options:
    A: To deliver care to the patient
    B: To convert claims into standard formats
    C: To process the claim and issue payment to the provider
    D: To schedule the patient's appointment
  correct_answer: C
  explanation_correct: In the claims flow, the payor (health plan) receives the claim, processes it through adjudication,
    and issues payment.
  explanation_incorrect_A: Delivering care is the provider's role.
  explanation_incorrect_B: Converting claims to standard formats is the clearinghouse's role.
  explanation_incorrect_D: Scheduling appointments is not the payor's role in the claims flow.
- question_id: Q-CRS-073
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-007
  question: Which coding system is used for diagnosis codes on a healthcare claim?
  options:
    A: CPT
    B: HCPCS Level II
    C: ICD-10-CM
    D: ASC X12
  correct_answer: C
  explanation_correct: ICD-10-CM is the coding system used for diagnosis codes, describing the clinical reason care was needed.
  explanation_incorrect_A: CPT codes describe procedures and services, not diagnoses.
  explanation_incorrect_B: HCPCS Level II codes describe supplies and services, not diagnoses.
  explanation_incorrect_D: ASC X12 is a transaction standard format, not a coding system for diagnoses.
- question_id: Q-CRS-074
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-007
  question: Which coding systems are used for procedure codes on healthcare claims?
  options:
    A: ICD-10-CM and ICD-10-PCS only
    B: CPT and HCPCS
    C: NPI and EIN
    D: 837 and 835
  correct_answer: B
  explanation_correct: CPT and HCPCS codes describe the procedures and services performed, and are paired with ICD-10-CM diagnosis
    codes on claims.
  explanation_incorrect_A: ICD-10-PCS is used for inpatient procedure coding; CPT and HCPCS are the standard procedure code
    sets on claims.
  explanation_incorrect_C: NPI is a provider identifier and EIN is a tax number; neither is a procedure code system.
  explanation_incorrect_D: These are HIPAA transaction numbers, not coding systems.
- question_id: Q-CRS-075
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-009
  question: If a provider submits a claim with a diagnosis code that does not support the procedure code according to the
    payor's coverage policy, what is the likely result?
  options:
    A: The claim is approved at a higher rate
    B: The claim may be denied for lack of medical necessity
    C: The payor automatically changes the diagnosis code
    D: The clearinghouse removes the procedure code before forwarding
  correct_answer: B
  explanation_correct: If the diagnosis does not support the procedure according to coverage policy, the payor may deny the
    claim for lack of medical necessity.
  explanation_incorrect_A: A mismatched diagnosis-procedure pair would not increase payment.
  explanation_incorrect_C: Payors do not automatically change diagnosis codes submitted by providers.
  explanation_incorrect_D: Clearinghouses do not alter clinical codes on claims.
- question_id: Q-CRS-076
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-011
  question: Why is it important for patients to understand that an EOB is not a bill?
  options:
    A: Because the EOB shows more than the patient owes — it includes how the plan processed the entire claim
    B: Because the EOB requires immediate payment to the health plan
    C: Because the EOB replaces the provider's bill entirely
    D: Because the EOB can be used as a tax deduction receipt
  correct_answer: A
  explanation_correct: An EOB is a summary of how the plan processed the claim, showing charges, allowed amounts, plan payments,
    and patient responsibility. Patients should compare it to the actual bill from the provider.
  explanation_incorrect_B: The EOB does not require payment to the health plan; the patient pays the provider.
  explanation_incorrect_C: The EOB does not replace the provider's bill; patients should compare both documents.
  explanation_incorrect_D: An EOB is not designed as a tax receipt.
- question_id: Q-CRS-077
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-006
  question: What changed about eligibility verification on January 1, 2013?
  options:
    A: Eligibility verification was no longer required for Medicare patients
    B: HIPAA operating rules began requiring health plans to respond to eligibility inquiries in real time
    C: Providers were no longer allowed to verify eligibility before providing care
    D: The 270 transaction was replaced by a new standard
  correct_answer: B
  explanation_correct: HIPAA operating rules effective January 1, 2013, require health plans to respond to eligibility inquiries
    in real time, including deductible, co-pay, and coinsurance information.
  explanation_incorrect_A: Eligibility verification is still required for Medicare.
  explanation_incorrect_C: Providers are still permitted and encouraged to verify eligibility before providing care.
  explanation_incorrect_D: The 270 transaction is still the standard for eligibility inquiries.
- question_id: Q-CRS-078
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-018
  question: A healthcare clearinghouse handles PHI when processing claims. Under HIPAA, what obligation does this create?
  options:
    A: The clearinghouse must delete all PHI within 24 hours
    B: The clearinghouse must protect PHI as a HIPAA covered entity
    C: The clearinghouse is exempt from HIPAA because it does not provide care
    D: The clearinghouse must obtain patient authorization before forwarding each claim
  correct_answer: B
  explanation_correct: Clearinghouses are one of the three types of HIPAA covered entities and must protect PHI under the
    Privacy Rule.
  explanation_incorrect_A: There is no 24-hour deletion requirement; the obligation is to protect PHI.
  explanation_incorrect_C: Clearinghouses are explicitly included as HIPAA covered entities.
  explanation_incorrect_D: Clearinghouses process claims under TPO and do not need individual patient authorization for each
    claim.
- question_id: Q-CRS-079
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-020
  question: A provider shares a patient's lab results with a specialist to coordinate treatment. Does this require the patient's
    written authorization under HIPAA?
  options:
    A: Yes, written authorization is always required before sharing any PHI
    B: No, sharing PHI for treatment is permitted under the TPO exception without patient authorization
    C: Yes, but only if the specialist is out of network
    D: No, because lab results are not considered PHI
  correct_answer: B
  explanation_correct: Under HIPAA, covered entities may share PHI for treatment, payment, and health care operations (TPO)
    without patient authorization. Coordinating care with a specialist falls under treatment.
  explanation_incorrect_A: HIPAA does not require written authorization for TPO purposes.
  explanation_incorrect_C: The TPO exception applies regardless of network status.
  explanation_incorrect_D: Lab results linked to a patient are PHI.
- question_id: Q-CRS-080
  type: MCQ
  pillar: cross_domain
  tutorial_id: T-CROSS-01
  fact_id: FACT-CRS-023
  question: HIPAA's Administrative Simplification provisions mandate standard formats for which of the following?
  options:
    A: Only claims submission (837)
    B: Claims (837), remittance (835), eligibility (270/271), claim status (276/277), and referral authorization (278)
    C: Only eligibility verification (270/271) and remittance advice (835)
    D: Only transactions between government programs like Medicare and Medicaid
  correct_answer: B
  explanation_correct: HIPAA's Administrative Simplification provisions mandate standard electronic formats for all of these
    key transaction types.
  explanation_incorrect_A: The provisions cover multiple transaction types, not just claims submission.
  explanation_incorrect_C: The provisions cover more than just eligibility and remittance transactions.
  explanation_incorrect_D: The standards apply to all HIPAA-covered entities, not just government programs.
