  pillar: payor
  tutorial_id: T-PAYOR-01
  question: How is the FMAP for a state calculated?
  options:
    A: It is the same flat rate for all states
    B: It varies by state based on per capita income
    C: It is based on the number of hospitals in the state
    D: It is set by the state governor each year
  correct_answer: B
  explanation_correct: The FMAP varies by state based on per capita income, meaning states with lower incomes receive a higher
    federal contribution.
  explanation_incorrect:
    A: The FMAP is not a flat rate; it is specifically designed to vary based on each state's economic conditions.
    C: The number of hospitals does not factor into the FMAP calculation.
    D: The FMAP is calculated using a federal formula, not set by state governors.
