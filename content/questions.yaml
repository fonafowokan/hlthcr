  pillar: payor
  tutorial_id: T-PAYOR-01
  question: What is coordination of benefits?
  options:
    A: A process that determines how much a patient owes after insurance pays
    B: Rules that determine which payor pays first when a patient has more than one insurance
    C: The process of enrolling in Medicare and Medicaid at the same time
    D: A method for calculating insurance premiums
  correct_answer: B
  explanation_correct: Coordination of benefits rules determine which payor pays first when a patient has coverage from more
    than one payor.
  explanation_incorrect:
    A: While patient cost-sharing is related, coordination of benefits specifically addresses the order in which multiple
      payors pay.
    C: Dual enrollment is a separate concept from coordination of benefits.
    D: Premium calculation is unrelated to coordination of benefits.
  fact_id: FACT-PAY-003
  regulatory_tags: []
  difficulty: basic
