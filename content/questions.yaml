  question: When must a provider give an uninsured patient a good faith estimate under the No Surprises Act?
  options:
    A: Only after the service has been completed
    B: Before or upon scheduling the health care service
    C: Within 90 days of the service
    D: Only if the patient files a formal complaint
  correct_answer: B
  explanation_correct: The No Surprises Act requires that providers give the good faith estimate before or upon scheduling
