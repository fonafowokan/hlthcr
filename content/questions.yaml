  tutorial_id: T-PAYOR-01
  question: What does the No Surprises Act require providers to give uninsured or self-pay patients?
  options:
    A: A free health screening
    B: A good faith estimate of expected charges
    C: Automatic enrollment in Medicaid
    D: A 50% discount on all services
  correct_answer: B
  explanation_correct: Under the No Surprises Act, providers must give uninsured or self-pay patients a good faith estimate
    of expected charges before or upon scheduling a service.
  explanation_incorrect:
    A: The Act requires cost transparency through estimates, not free screenings.
    C: The Act does not automatically enroll anyone in Medicaid.
    D: The Act requires cost estimates, not mandatory discounts.
