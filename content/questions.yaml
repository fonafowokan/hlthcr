    C: The federal government randomly assigns different benefits to each state
    D: Only states with high populations are allowed to offer additional services
  correct_answer: B
  explanation_correct: Medicaid is administered by individual states according to federal requirements, which means states
    have flexibility in setting eligibility rules and covered services beyond the federal minimum.
  explanation_incorrect:
    A: Medicaid is a government program, not a private insurance program.
