  # TUTORIAL 4 — DATA PILLAR
  # ══════════════════════════════════════════════════════════════════
  - tutorial_id: T-DATA-01
    title: "Healthcare Data and Privacy"
    pillar: data
    learning_objectives:
      - "Define Protected Health Information (PHI) and explain why it matters"
      - "Describe HIPAA's Privacy Rule, Security Rule, and Breach Notification Rule"
      - "Identify covered entities and business associates under HIPAA"
      - "Explain the purpose of ICD, CPT, and HCPCS codes in healthcare"
      - "Understand the difference between in-network and out-of-network providers and the role of Electronic Health Records"
    sections:
      - heading: "What Is Protected Health Information?"
        text: >
          Healthcare generates a lot of sensitive data. Protected Health Information (PHI) is
          any individually identifiable health information that relates to your past, present,
          or future physical or mental health, the care you received, or payment for that
          care.


          PHI includes things like your name, address, date of birth, and Social Security
          Number when they are linked to health information. It is protected under HIPAA
          regardless of form — whether it is in a computer system, on paper, or spoken aloud.

      - heading: "The HIPAA Privacy Rule"
        text: >
          The HIPAA Privacy Rule sets national standards for protecting PHI. It applies to
          covered entities — health plans, healthcare providers, and clearinghouses — as well
          as their business associates.


          One key concept is the minimum necessary standard. Covered entities must make
          reasonable efforts to limit how much PHI they use or share to only what is needed
          for the task at hand. For example, if a billing office needs to process a claim,
          they should only access the billing-related information, not your entire medical
          history.


          There is an exception: when providers share PHI for treatment purposes, the minimum
          necessary rule does not apply. Your doctor can share your full relevant history with
          a specialist who is treating you. You also have the right to access, inspect, and
          get copies of your own PHI.

      - heading: "Covered Entities and Business Associates"
        text: >
          HIPAA defines three types of covered entities: health plans (like insurance
          companies and Medicare), healthcare clearinghouses, and healthcare providers who
          send health information electronically.


          A business associate is a person or organization that handles PHI on behalf of a
          covered entity. For example, a company that stores medical records in the cloud for
          a hospital is a business associate. They must sign a written agreement to follow
          HIPAA rules and protect the data they handle.

      - heading: "The Security Rule and Breach Notification"
        text: >
          While the Privacy Rule covers all forms of PHI, the HIPAA Security Rule focuses
          specifically on electronic PHI (ePHI). It requires covered entities and business
          associates to ensure the confidentiality, integrity, and availability of ePHI.


          The Security Rule requires three types of safeguards: administrative (policies and
          procedures), physical (protecting facilities and equipment), and technical
          (technology controls for access and data protection). Think of it as locking the
          building, training the staff, and securing the computers.


          If a breach of unsecured PHI does happen, the Breach Notification Rule kicks in.
          The covered entity must notify affected individuals within 60 days of discovering
          the breach. If the breach affects more than 500 people in a state, prominent media
          outlets and the HHS Secretary must also be notified. Smaller breaches are reported
          to HHS annually.

      - heading: "Medical Codes: ICD, CPT, and HCPCS"
        text: >
          Healthcare runs on standardized codes. When your doctor diagnoses you with
          something, that diagnosis is translated into an ICD code (International
          Classification of Diseases). The U.S. switched from ICD-9 to ICD-10 in 2015,
          expanding from about 14,000 codes to about 69,000. ICD-10 codes can be up to 7
          characters long and capture more detail about the location, severity, and type
          of a condition.


          ICD-10-CM (Clinical Modification) codes are used everywhere for diagnoses.
          ICD-10-PCS (Procedure Coding System) codes are used specifically for inpatient
          hospital procedures.


          On the procedure side, CPT (Current Procedural Terminology) codes are 5-digit
          numbers maintained by the American Medical Association that identify the services
          a provider performed. HCPCS (Healthcare Common Procedure Coding System) has two
          levels: Level I is the CPT codes, and Level II covers products and services not in
          CPT — like ambulance services, durable medical equipment, and prosthetics. Level II
          codes start with a letter followed by 4 digits and are maintained by CMS.

      - heading: "In-Network vs. Out-of-Network"
        text: >
          An in-network provider has a contract with your health insurer to provide services
          at pre-negotiated rates. This means lower out-of-pocket costs for you. If you visit
          an in-network doctor, your insurer has already agreed on what the service should
          cost.


          An out-of-network provider has no such contract. You typically pay significantly
          more for the same service. For example, an in-network office visit might cost you
          a $25 copay, while the same visit out-of-network could cost you hundreds of dollars.

      - heading: "Electronic Health Records"
        text: >
          An Electronic Health Record (EHR) is a digital version of your medical history.
          It includes your demographics, medications, vital signs, immunizations, lab results,
          and radiology reports — all maintained by your provider over time.


          EHRs help reduce duplicate tests, decrease treatment delays, and improve the
          accuracy of medical records by making your information available electronically to
          authorized providers. Certified EHR technology stores your data in a structured
          format so providers can easily retrieve, transfer, and use it to support care
          decisions.

    summary:
      - "PHI is any health-related information that can identify you, and HIPAA protects it whether it is electronic, on paper, or spoken."
      - "The Privacy Rule limits how PHI is used and shared; the Security Rule adds technical, physical, and administrative safeguards for electronic data."
      - "If a data breach occurs, affected individuals must be notified within 60 days."
      - "ICD codes capture diagnoses, CPT codes capture procedures, and HCPCS Level II codes cover equipment and supplies — together they form the language of medical billing."
      - "Using in-network providers saves you money, and EHRs make your health information more accessible and accurate."
