# Healthcare Foundations — Tutorial Modules
# Each tutorial groups related facts into a plain-language lesson
# 5 tutorials, one per pillar, foundational level

tutorials:
  # ══════════════════════════════════════════════════════════════════
  # TUTORIAL 1 — PAYOR PILLAR
  # ══════════════════════════════════════════════════════════════════
  - tutorial_id: T-PAYOR-01
    title: "Who Pays for Healthcare?"
    pillar: payor
    learning_objectives:
      - "Define what a payor is and explain the payor's role in healthcare"
      - "Identify the three broad categories of healthcare payors: government programs, commercial insurance, and self-pay"
      - "Describe the difference between Medicare Part A and Part B"
      - "Explain how Medicaid differs from Medicare in eligibility and administration"
      - "Understand how HIPAA applies to health plans as covered entities"
    sections:
      - heading: "What Is a Payor?"
        text: >
          When you visit a doctor or go to the hospital, someone has to pay the bill. A payor
          (also spelled "payer") is the entity responsible for paying healthcare providers for
          the services you receive.


          Payors fall into three broad categories: government programs like Medicare and
          Medicaid, commercial (private) insurance companies, and self-pay. Most Americans
          have coverage through one of these channels.


          When a patient has coverage from more than one payor, coordination of benefits rules
          determine which payor pays first. The one that pays first is called the primary payer.

      - heading: "Government Payors: Medicare"
        text: >
          Medicare is a federal health insurance program run by the Centers for Medicare and
          Medicaid Services (CMS), an agency within the U.S. Department of Health and Human
          Services. It primarily covers people age 65 and older, but it also covers certain
          younger people with disabilities, End-Stage Renal Disease, or ALS.


          Original Medicare has two main parts. Part A is Hospital Insurance. It covers
          inpatient hospital stays, skilled nursing facility care, hospice care, and some home
          health services. Most people do not pay a monthly premium for Part A because they or
          their spouse paid Medicare taxes for at least 10 years while working.


          Part B is Medical Insurance. It covers doctors' visits, outpatient hospital care,
          durable medical equipment like wheelchairs, and preventive services such as
          screenings and vaccinations. Part B requires a monthly premium. For 2026, the
          standard Part B premium is $202.90 per month with a $283 annual deductible.


          If you are already receiving Social Security benefits, you are automatically enrolled
          in both Part A and Part B when you become eligible.

      - heading: "Government Payors: Medicaid"
        text: >
          Medicaid is a joint federal and state program that provides health coverage to
          eligible low-income adults, children, pregnant women, elderly adults, and people
          with disabilities. Unlike Medicare, which is purely federal, Medicaid is funded by
          both the federal government and state governments. The federal share varies by
          state based on per capita income and is called the Federal Medical Assistance
          Percentage (FMAP).


          Each state runs its own Medicaid program following federal requirements. This means
          eligibility rules and covered services can differ from state to state. Medicaid
          eligibility is based on income and household size rather than age, and people can
          apply at any time during the year. There is no annual enrollment window like some
          other programs.

      - heading: "Commercial (Private) Insurance"
        text: >
          Commercial health insurance is the most common form of health coverage in the
          United States. You can get it through your employer, purchase it on the Health
          Insurance Marketplace, or buy it directly from an insurance company. Companies
          like Aetna, Blue Cross Blue Shield, and UnitedHealthcare are examples of major
          commercial insurers.


          Employer-sponsored group health plans are the most common way Americans get private
          insurance. Typically, the employer shares the cost of premiums with employees. For
          example, your company might pay 70% of the monthly premium and you pay the remaining
          30%.


          Commercial plans come in several types. An HMO (Health Maintenance Organization)
          usually requires you to choose a primary care doctor and get referrals to see
          specialists. A PPO (Preferred Provider Organization) gives you more flexibility to
          see any provider but costs less when you stay in-network. Other types include EPO
          (Exclusive Provider Organization) and POS (Point of Service) plans.

      - heading: "Self-Pay Patients"
        text: >
          A self-pay patient is someone who does not have health insurance or who chooses not
          to file a claim with their insurer for a particular service. An uninsured individual
          is someone not enrolled in any group health plan, individual insurance, or federal
          healthcare program.


          If you are uninsured or self-pay, providers are required to help you understand costs
          upfront. Under the No Surprises Act, providers must give you a good faith estimate
          of expected charges before or when you schedule a healthcare service. This way, you
          know roughly what you will owe before you receive care.

      - heading: "HIPAA and Health Plans"
        text: >
          You may have heard of HIPAA, the Health Insurance Portability and Accountability
          Act. Under HIPAA, health plans are one of three types of "covered entities" that
          must follow strict rules to protect patient health information. The other two types
          are healthcare providers and clearinghouses.


          HIPAA-covered health plans include health insurance companies, HMOs, employer-
          sponsored group health plans, and government programs such as Medicare and Medicaid.
          These entities must comply with HIPAA's Privacy Rule and Security Rule.


          There is one notable exception: a group health plan with fewer than 50 participants
          that is administered solely by the employer is exempt from HIPAA covered-entity
          requirements.

    summary:
      - "A payor is the entity that pays providers for healthcare services — either a government program, a commercial insurer, or the patient themselves (self-pay)."
      - "Medicare is a federal program mainly for people 65 and older; Part A covers hospital stays, Part B covers doctor visits and outpatient care."
      - "Medicaid is a joint federal-state program for low-income individuals, with eligibility rules that vary by state."
      - "Commercial insurance, often provided through employers, is the most common coverage in the U.S. and comes in plan types like HMO and PPO."
      - "Under HIPAA, health plans must protect patient health information just like providers and clearinghouses."
