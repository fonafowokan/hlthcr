  # TUTORIAL 2 — PROVIDER PILLAR
  # ══════════════════════════════════════════════════════════════════
  - tutorial_id: T-PROVIDER-01
    title: "Who Provides Healthcare?"
    pillar: provider
    learning_objectives:
      - "Define what a healthcare provider is and distinguish between providers and suppliers under Medicare"
      - "Identify the main types of providers: physicians, hospitals, DME suppliers, ambulance services, and ancillary services"
      - "Explain how providers bill payors using standard claim forms"
      - "Describe the Medicare and Medicaid enrollment process for providers"
      - "Understand why most providers are HIPAA covered entities"
    sections:
      - heading: "What Is a Healthcare Provider?"
        text: >
          A healthcare provider is a person trained and licensed to give healthcare, or a
          place licensed to give healthcare. Your family doctor is a provider. So is a
          hospital, a pharmacy, and a physical therapy clinic.


          Medicare law makes an important distinction. It calls facilities like hospitals,
          hospices, and nursing homes "providers." It calls entities that furnish equipment
          or diagnostic services "suppliers." The distinction matters for billing and
          enrollment, but in everyday language, people use "provider" for both.

      - heading: "Types of Providers"
        text: >
          Physicians and non-physician practitioners (like nurse practitioners and physician
          assistants) are the providers most people see first. A physician office is a common
          setting where you receive outpatient evaluation, diagnosis, and treatment.


          Hospitals are institutional providers. They include general hospitals, critical
          access hospitals, skilled nursing facilities, home health agencies, and hospices.
          If you break your arm and need surgery, a hospital is where you would go.


          Durable Medical Equipment (DME) suppliers provide equipment that can withstand
          repeated use and lasts at least three years. Think of hospital beds, wheelchairs,
          ventilators, oxygen equipment, artificial limbs, and back braces. DME serves a
          medical purpose and is meant to be used in your home.


          Ambulance services are another provider type. Medicare covers ambulance
          transportation only when your medical condition makes other transportation unsafe.
          Emergency air ambulance by helicopter or airplane is covered when ground ambulance
          cannot get you there fast enough.


          Ancillary services round out the picture. These include lab tests, radiology,
          pharmacy services, and other diagnostic or therapeutic services that support your
          primary care. Clinical labs operate in many settings — hospitals, physician offices,
          pharmacies, surgery centers, and as independent labs.

      - heading: "How Providers Bill for Services"
        text: >
          When a provider treats you, they need to send a bill — called a claim — to the
          payor. Different types of providers use different claim forms.


          Non-institutional providers and suppliers (like your doctor's office) bill Medicare
          using the CMS-1500 form or its electronic version, the 837P transaction.
          Institutional providers (like hospitals) use the CMS-1450 form, also known as the
          UB-04, or the electronic 837I transaction.


          Nearly all providers must submit claims to Medicare electronically. This is required
          under the Administrative Simplification Compliance Act (ASCA), unless the provider
          qualifies for a special waiver.

      - heading: "Enrolling in Medicare"
        text: >
          Before a provider can bill Medicare, they must enroll. The process has three main
          steps. First, the provider gets a National Provider Identifier (NPI) — a unique
          10-digit number used across all health transactions. Second, they complete an
          application through PECOS, Medicare's online enrollment system. Third, they work
          with their regional Medicare Administrative Contractor (MAC).


          Different provider types use different enrollment forms. Physicians use form
          CMS-855I. Hospitals and other institutional providers use form CMS-855A. DME
          suppliers use form CMS-855S and must also get accreditation from a CMS-approved
          organization and post a $50,000 surety bond.


          Online applications through PECOS process in about 30 days. Paper applications
          take about 65 days. The ambulance fee schedule covers volunteer, municipal, private,
          and independent ambulance suppliers as well as hospitals.

      - heading: "Enrolling in Medicaid"
        text: >
          Medicaid enrollment works differently from Medicare. Each state runs its own
          Medicaid provider enrollment process and can impose requirements beyond the federal
          minimums set by CMS.


          At a minimum, state Medicaid agencies must verify that a provider holds an
          unrestricted license before approving enrollment. Beyond that, states may require
          additional documentation, background checks, or site visits.

      - heading: "HIPAA and Providers"
        text: >
          Under HIPAA, a healthcare provider becomes a "covered entity" when it transmits
          health information electronically in connection with certain transactions, such as
          billing claims. In practice, most doctors, clinics, hospitals, psychologists,
          chiropractors, nursing homes, pharmacies, and dentists are HIPAA covered entities.


          As covered entities, providers must comply with the Privacy Rule and Security Rule.
          This means they must put safeguards in place to protect patient health information,
          train their employees on privacy practices, and have contracts with any business
          associates that handle patient data on their behalf.

    summary:
      - "A healthcare provider is any licensed person or facility that delivers care — including physicians, hospitals, DME suppliers, ambulance services, and ancillary services like labs."
      - "Providers bill payors using standardized claim forms: the CMS-1500 for non-institutional providers and the UB-04 for hospitals and facilities."
      - "To bill Medicare, providers must obtain an NPI, enroll through PECOS, and work with their regional Medicare Administrative Contractor."
      - "Each state runs its own Medicaid enrollment process with requirements that can go beyond federal minimums."
      - "Most providers are HIPAA covered entities and must protect patient health information under the Privacy and Security Rules."
