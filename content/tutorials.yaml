  # ══════════════════════════════════════════════════════════════════
  # TUTORIAL 5 — CROSS-DOMAIN PILLAR
  # ══════════════════════════════════════════════════════════════════
  - tutorial_id: T-CROSS-01
    title: "How It All Connects"
    pillar: cross_domain
    learning_objectives:
      - "Trace the end-to-end flow of a healthcare claim from patient visit to payment"
      - "Explain how eligibility verification works before a service is provided"
      - "Describe how diagnosis codes and procedure codes work together on a claim"
      - "Identify the roles of clearinghouses, NPIs, and standardized transaction formats in connecting the system"
      - "Understand how HIPAA ties together payors, providers, and patients through shared privacy obligations"
    sections:
      - heading: "The Life of a Claim"
        text: >
          Let me walk you through how a healthcare claim works from start to finish. You
          visit a doctor. The doctor treats you. Then the doctor's office submits a claim —
          a standardized bill — to your health plan. The health plan processes the claim and
          issues payment.


          Providers submit claims electronically to payors or to intermediaries like Medicare
          Administrative Contractors, using HIPAA-standard transaction formats. When the
          payor receives a claim, automated checks verify completeness, valid data, duplicate
          submissions, and whether the provider and patient are eligible.


          After these checks, the claim is adjudicated. It can be approved for payment,
          rejected (sent back to the provider for corrections), or denied (the service is
          not covered or does not meet policy requirements).

      - heading: "Eligibility Verification"
        text: >
          Before treating you, a provider can check whether your insurance is active and what
          it covers. They do this by sending an electronic eligibility inquiry — called a
          HIPAA 270 transaction — to your health plan.


          Since January 2013, HIPAA rules require health plans to respond to these inquiries
          in real time. The response includes information about your deductibles, copays, and
          coinsurance. This helps the provider's office tell you upfront what you might owe
          for a visit.

      - heading: "How Codes Tell the Story"
        text: >
          Every claim must pair a diagnosis code with a procedure code. The diagnosis code
          (ICD-10-CM) explains why you needed care. The procedure code (CPT or HCPCS)
          describes what the provider did. Together, they link the clinical documentation to
          the payor's reimbursement decision.


          If a claim is submitted without a valid diagnosis code, it gets returned as
          incomplete and will not be processed. Even if the codes are present, the payor
          checks whether the diagnosis supports the procedure. If the diagnosis does not
          justify the service according to coverage policy, the claim may be denied for
          lack of medical necessity. For example, a claim for a knee MRI would need a
          diagnosis that explains why imaging the knee was medically needed.

      - heading: "Explanation of Benefits and Reimbursement"
        text: >
          After your claim is processed, two things happen. Your health plan sends you an
          Explanation of Benefits (EOB). It shows the provider's charges, the allowed amount,
          what the plan paid, and what you owe. Remember, the EOB is not a bill — it is a
          summary. You should compare it to the actual bill from your provider.


          At the same time, the payor sends the provider an Electronic Remittance Advice
          (ERA) — a HIPAA 835 transaction — detailing the payment amount, any adjustments,
          and reasons for denials.


          The "allowed amount" is the maximum your plan will pay for a covered service. For
          in-network services, the provider generally cannot bill you beyond the allowed
          amount. Your share is limited to your copay, coinsurance, or deductible.

      - heading: "Clearinghouses: The Middlemen"
        text: >
          A healthcare clearinghouse is an intermediary that sits between providers and
          payors. It receives claims and other transactions from providers, converts them
          into HIPAA-standard electronic formats, and forwards them to the correct health
          plan.


          Think of a clearinghouse as a translator. A provider's billing system might format
          data one way, but the health plan expects it in a specific standard format. The
          clearinghouse makes sure everything matches up. Clearinghouses are one of the
          three types of HIPAA covered entities, alongside health plans and providers.

      - heading: "The National Provider Identifier"
        text: >
          Every HIPAA-covered provider has a National Provider Identifier (NPI) — a unique,
          permanent 10-digit number. The NPI must appear on all electronic claims, eligibility
          inquiries, and other HIPAA transactions.


          The NPI is "intelligence-free." That means the number itself carries no information
          about the provider's location, specialty, or type. It is purely a unique identifier,
          like a Social Security Number for providers. This ensures that each provider can be
          consistently identified across every transaction in the system.

      - heading: "HIPAA Ties It All Together"
        text: >
          HIPAA's Privacy Rule applies to all three types of covered entities — health plans,
          healthcare providers, and clearinghouses. Each must protect patients' protected
          health information (PHI). PHI is any data about a person's health, care, or payment
          that can identify them.


          Covered entities can share PHI without patient authorization for three purposes:
          treatment, payment, and healthcare operations — known as TPO. Outside of those
          purposes, the minimum necessary standard applies, meaning entities must limit
          shared information to the smallest amount needed.


          You have the right to access and obtain copies of your health records from any
          covered entity within 30 days and to request corrections. HIPAA's Administrative
          Simplification provisions also mandate standard electronic formats for key
          transactions — claims (837), remittance advice (835), eligibility verification
          (270/271), claim status (276/277), and referral authorization (278). The current
          standard is ASC X12 Version 5010, used by providers, payors, and clearinghouses
          nationwide. These standardized formats allow any provider to submit a claim to any
          health plan using the same data structure, enabling interoperability across the
          entire system.

    summary:
      - "A claim flows from patient visit to provider submission to payor adjudication, resulting in payment, rejection, or denial."
      - "Eligibility verification happens electronically in real time before or at the time of service."
      - "Every claim pairs a diagnosis code (ICD-10) with a procedure code (CPT/HCPCS) — both must be valid for the claim to be paid."
      - "Clearinghouses translate and route claims between providers and payors, and the NPI uniquely identifies every provider in the system."
      - "HIPAA unifies the system by requiring all covered entities to protect PHI and use standardized electronic transaction formats."
