  # TUTORIAL 3 — PATIENT PILLAR
  # ══════════════════════════════════════════════════════════════════
  - tutorial_id: T-PATIENT-01
    title: "Who Receives Healthcare?"
    pillar: patient
    learning_objectives:
      - "Explain the difference between a subscriber and a dependent on a health insurance plan"
      - "Describe how eligibility and enrollment work, including open enrollment and special enrollment periods"
      - "Identify patient rights under HIPAA, including the right to access and amend health records"
      - "Define key cost-sharing terms: premium, deductible, copay, coinsurance, and out-of-pocket maximum"
      - "Understand the purpose of an Explanation of Benefits (EOB) and the importance of patient engagement"
    sections:
      - heading: "Subscribers and Dependents"
        text: >
          When someone signs up for health insurance, they become the subscriber — also
          called the policyholder. The subscriber is the primary person who holds the
          insurance contract.


          Family members covered under that same plan are called dependents. A dependent
          might be a spouse, a child, or a domestic partner. Under the Affordable Care Act,
          children can stay on a parent's plan until they turn 26, regardless of whether
          they are married. For example, if you get a job at 22 that does not offer insurance,
          you can remain on your parent's plan for four more years.

      - heading: "Getting Covered: Eligibility and Enrollment"
        text: >
          How you get health insurance depends on where you get it. Eligibility for
          employer-sponsored insurance is determined by your employer's plan rules.
          Marketplace eligibility depends on factors like your income, household size, and
          where you live.


          Most health plans have an Open Enrollment period — an annual window when anyone
          can enroll in, renew, or change their plan. Outside that window, you generally
          cannot sign up unless you experience a qualifying life event.


          A Special Enrollment Period (SEP) lets you enroll or change plans outside of Open
          Enrollment after certain life changes — like losing your coverage, getting married,
          having a baby, or moving to a new state. Most SEPs give you 60 days before or after
          the event to pick a new plan.

      - heading: "Your Rights Under HIPAA"
        text: >
          As a patient, you have important rights when it comes to your health information.
          Under the HIPAA Privacy Rule, you have a legal right to access and obtain copies of
          your protected health information (PHI) from covered entities like doctors,
          hospitals, and health plans. They must respond to your request within 30 days.


          You can also request corrections or amendments to your health records if you believe
          something is inaccurate or incomplete. And you can direct a covered entity to send
          your records to a third party — another doctor, a family member, or anyone you
          choose.


          A provider may charge a reasonable fee for copying and mailing your records, but
          they cannot charge you for searching for or retrieving them. If you ever believe
          your privacy rights have been violated, you can file a complaint with the U.S.
          Department of Health and Human Services (HHS).

      - heading: "Notice of Privacy Practices and Consent"
        text: >
          When you visit a new doctor or hospital, they will usually ask you to sign a form
          acknowledging their Notice of Privacy Practices. This is a plain-language document
          required by HIPAA that explains how the provider may use and share your health
          information.


          Separately, before any procedure or treatment, your provider should obtain your
          informed consent. This means the clinician explains the risks, benefits, and
          alternatives so you can make a voluntary, informed decision. Competent adults
          give their own consent. For children, a parent or legal guardian provides it.


          In a life-threatening emergency, informed consent can be waived if there is not
          enough time to obtain it and no authorized decision-maker is available. For
          instance, if you arrive at the emergency room unconscious, doctors can begin
          life-saving treatment immediately.

      - heading: "Understanding Your Costs"
        text: >
          Health insurance does not mean free healthcare. You share costs with your plan in
          several ways.


          A premium is the amount you pay each month to keep your coverage active, whether
          or not you see a doctor. A deductible is the amount you must pay out of pocket
          each year before your plan starts paying its share. For example, if your deductible
          is $1,000, you pay the first $1,000 of covered services yourself.


          A copay is a fixed dollar amount you pay at the time of a visit — like $25 for a
          doctor's appointment. Coinsurance is a percentage you pay after meeting your
          deductible. For example, you might pay 20% of a covered service while your plan
          pays 80%.


          The out-of-pocket maximum is the most you will pay in a plan year. Once you hit
          that number, your plan pays 100% of covered costs for the rest of the year. This
          protects you from very high medical bills.

      - heading: "Explanation of Benefits"
        text: >
          After your health plan processes a claim from your provider, it sends you an
          Explanation of Benefits (EOB). The EOB shows what was billed, what the plan paid,
          and what you owe. It is not a bill — it is a summary.


          You should compare your EOB with the actual bill from your provider to make sure
          the services and amounts match before you pay. If something does not line up,
          contact your provider or your health plan to ask about it.

      - heading: "Patient Engagement"
        text: >
          Patient engagement means having the knowledge, skills, and confidence to actively
          participate in your own healthcare decisions. Research shows that patients who are
          more engaged tend to have better health outcomes and lower costs.


          Simple steps make a difference: asking questions during appointments, understanding
          your insurance benefits, reviewing your EOBs, and keeping track of your medical
          records. The more you understand the system, the better you can navigate it.

    summary:
      - "The subscriber holds the insurance contract; dependents are covered family members, and children can stay on a parent's plan until age 26."
      - "Open Enrollment is the annual window to sign up or change plans; Special Enrollment Periods allow changes after qualifying life events."
      - "Under HIPAA, you have the right to access, copy, and request corrections to your health records."
      - "Cost sharing includes premiums, deductibles, copays, coinsurance, and an out-of-pocket maximum that caps your annual spending."
      - "Always compare your Explanation of Benefits with your provider's bill before paying."
