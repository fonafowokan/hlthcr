# Aspirational target distribution. The CONTRAST pillar (Medicare vs. Medicaid)
# is intentionally a lean module (40 questions, 1 tutorial) rather than the
# 200/8-12 used by the five primary pillars.
questions:
  total: 1040
  types:
    true_false: 315
    mcq: 725

  by_pillar:
    payor: 200
    provider: 200
    patient: 200
    data: 200
    cross_domain: 200
    contrast: 40   # lean module: 15 TF + 25 MCQ

tutorials:
  total: 40-60
  per_pillar: 8-12        # primary pillars
  contrast: 1             # lean module

scenes:
  per_tutorial: 3-5
