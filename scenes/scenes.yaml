  - scene_id: SCN-CROSS-01-04
    tutorial_id: T-CROSS-01
    order: 4
    scene_type: lesson
    screen_text: "Every claim pairs a diagnosis code (ICD-10-CM — why care was needed) with a procedure code (CPT/HCPCS — what was done). Missing or mismatched codes cause rejections. The payor checks whether the diagnosis supports the procedure for medical necessity."
    visual_asset: images/cross-codes-claim.png
    visual_type: excalidraw
    visual_prompt_hint: "Paired-box diagram: Diagnosis Code (ICD-10 — 'why') linked to Procedure Code (CPT/HCPCS — 'what') flowing into claim validation checkpoint"
    audio_asset: audio/cross-01-04.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-CRS-006
      - FACT-CRS-007
      - FACT-CRS-008

  - scene_id: SCN-CROSS-01-05
    tutorial_id: T-CROSS-01
    order: 5
    scene_type: lesson
    screen_text: "After adjudication, the patient gets an EOB (charges, plan payment, amount owed) and the provider gets an ERA (HIPAA 835 transaction) with payment details and adjustment reasons. The allowed amount caps what in-network providers can bill you."
    visual_asset: images/cross-eob-era.png
    visual_type: excalidraw
    visual_prompt_hint: "Split output diagram: Payor in center, arrow left to Patient (EOB document) and arrow right to Provider (ERA / 835 transaction) with key fields labeled"
    audio_asset: audio/cross-01-05.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-CRS-009
      - FACT-CRS-010
      - FACT-CRS-011

  - scene_id: SCN-CROSS-01-06
    tutorial_id: T-CROSS-01
    order: 6
    scene_type: lesson
    screen_text: "Clearinghouses are intermediaries that translate and route claims between providers and payors into HIPAA-standard formats. They are one of the three HIPAA covered entity types, alongside health plans and providers."
    visual_asset: images/cross-clearinghouse.png
    visual_type: excalidraw
    visual_prompt_hint: "Three-node flow: Provider -> Clearinghouse (translator icon) -> Payor, with 'HIPAA standard format' label on the output arrow"
    audio_asset: audio/cross-01-06.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
