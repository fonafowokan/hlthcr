      - FACT-CRS-015

  - scene_id: SCN-CROSS-01-08
    tutorial_id: T-CROSS-01
    order: 8
    scene_type: lesson
    screen_text: "HIPAA unifies the system. All covered entities must protect PHI and can share it without authorization only for treatment, payment, and operations (TPO). Standard electronic formats (ASC X12 Version 5010) enable any provider to submit claims to any plan using the same structure."
