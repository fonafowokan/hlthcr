      - FACT-CRS-013

  - scene_id: SCN-CROSS-01-07
    tutorial_id: T-CROSS-01
    order: 7
    scene_type: lesson
    screen_text: "Every covered provider has a National Provider Identifier (NPI) — a unique, permanent 10-digit number on all electronic transactions. The NPI is 'intelligence-free,' carrying no information about specialty or location — just a unique ID."
    visual_asset: images/cross-npi.png
    visual_type: excalidraw
    visual_prompt_hint: "Callout box showing NPI format (10-digit example), with arrows pointing to claims, eligibility checks, and other transactions where it appears"
