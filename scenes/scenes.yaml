  # ══════════════════════════════════════════════════════════════════
  # TUTORIAL 5 — T-CROSS-01: "How It All Connects"
  # ══════════════════════════════════════════════════════════════════

  - scene_id: SCN-CROSS-01-01
    tutorial_id: T-CROSS-01
    order: 1
    scene_type: intro
    screen_text: "How It All Connects"
    visual_asset: images/cross-title-card.png
    visual_type: nano-banana
    visual_prompt_hint: "Cross-domain title card — interconnected network of healthcare icons (heart, clipboard, shield, dollar), vibrant multi-color, holistic feel"
    audio_asset: audio/cross-01-01.mp3
    layout: full_visual
    aspect_ratio: "16:9"
    linked_facts: []

  - scene_id: SCN-CROSS-01-02
    tutorial_id: T-CROSS-01
    order: 2
    scene_type: lesson
    screen_text: "A claim flows through clear steps: patient visits provider, provider submits a standardized claim electronically, payor runs automated checks (completeness, eligibility, duplicates), then adjudicates — approving, rejecting, or denying the claim."
