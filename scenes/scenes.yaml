  - scene_id: SCN-CROSS-01-03
    tutorial_id: T-CROSS-01
    order: 3
    scene_type: lesson
    screen_text: "Before treatment, providers verify your insurance by sending a HIPAA 270 transaction. Since 2013, health plans must respond in real time with your deductible, copay, and coinsurance details — so you know upfront what you may owe."
    visual_asset: images/cross-eligibility.png
    visual_type: excalidraw
    visual_prompt_hint: "Request-response diagram: Provider sends 270 inquiry -> Health Plan responds with coverage details (deductible, copay, coinsurance) in real time"
