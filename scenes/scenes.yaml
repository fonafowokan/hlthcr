  # ══════════════════════════════════════════════════════════════════
  # TUTORIAL 4 — T-DATA-01: "Healthcare Data and Privacy"
  # ══════════════════════════════════════════════════════════════════

  - scene_id: SCN-DATA-01-01
    tutorial_id: T-DATA-01
    order: 1
    scene_type: intro
    screen_text: "Healthcare Data and Privacy"
    visual_asset: images/data-title-card.png
    visual_type: nano-banana
    visual_prompt_hint: "Data privacy title card — lock and medical data icons, deep blue and silver tones, secure and modern feel"
    audio_asset: audio/data-01-01.mp3
    layout: full_visual
    aspect_ratio: "16:9"
    linked_facts: []

  - scene_id: SCN-DATA-01-02
    tutorial_id: T-DATA-01
    order: 2
    scene_type: lesson
    screen_text: "Protected Health Information (PHI) is any individually identifiable data about your health, care, or payment. It includes names, addresses, dates of birth, and SSNs when linked to health data. PHI is protected under HIPAA in any form — electronic, paper, or spoken."
    visual_asset: images/data-phi.png
    visual_type: excalidraw
    visual_prompt_hint: "Diagram showing PHI examples (name, DOB, SSN, medical record) grouped inside a shield/lock icon, with 'electronic, paper, spoken' labels"
    audio_asset: audio/data-01-02.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-DAT-001
      - FACT-DAT-002
      - FACT-DAT-003

  - scene_id: SCN-DATA-01-03
    tutorial_id: T-DATA-01
    order: 3
    scene_type: lesson
    screen_text: "The HIPAA Privacy Rule sets national standards for protecting PHI. The minimum necessary standard limits access to only what is needed for the task. Exception: treatment purposes — your doctor can share your full history with a treating specialist."
    visual_asset: images/data-privacy-rule.png
    visual_type: excalidraw
    visual_prompt_hint: "Flowchart: PHI access request -> Is it for treatment? Yes: full access. No: minimum necessary standard applies — only relevant data shared"
    audio_asset: audio/data-01-03.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-DAT-004
      - FACT-DAT-005
      - FACT-DAT-006

  - scene_id: SCN-DATA-01-04
    tutorial_id: T-DATA-01
    order: 4
    scene_type: lesson
    screen_text: "HIPAA defines three covered entities: health plans, clearinghouses, and providers who transmit electronically. A business associate handles PHI on behalf of a covered entity and must sign a written agreement to follow HIPAA rules."
    visual_asset: images/data-covered-entities.png
    visual_type: excalidraw
    visual_prompt_hint: "Three-column layout: Health Plans, Clearinghouses, Providers — with Business Associates shown below connected by contract/agreement arrows"
    audio_asset: audio/data-01-04.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-DAT-007
      - FACT-DAT-008
      - FACT-DAT-009

  - scene_id: SCN-DATA-01-05
    tutorial_id: T-DATA-01
    order: 5
    scene_type: lesson
    screen_text: "The Security Rule protects electronic PHI (ePHI) through three safeguard types: administrative (policies), physical (facility protection), and technical (access controls). If a breach occurs, the Breach Notification Rule requires notifying affected individuals within 60 days."
    visual_asset: images/data-security-rule.png
    visual_type: excalidraw
    visual_prompt_hint: "Three-pillar diagram: Administrative, Physical, Technical safeguards — with Breach Notification timeline (60 days) below"
    audio_asset: audio/data-01-05.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-DAT-010
      - FACT-DAT-011
      - FACT-DAT-012
      - FACT-DAT-013

  - scene_id: SCN-DATA-01-06
    tutorial_id: T-DATA-01
    order: 6
    scene_type: lesson
    screen_text: "ICD-10 codes capture diagnoses (~69,000 codes, up to 7 characters). CPT codes (5-digit) identify procedures performed. HCPCS Level II codes cover equipment and supplies not in CPT — like ambulances, DME, and prosthetics."
    visual_asset: images/data-medical-codes.png
    visual_type: excalidraw
    visual_prompt_hint: "Three-row reference table: ICD-10 (diagnoses, 69K codes) | CPT (procedures, 5-digit) | HCPCS Level II (equipment/supplies, letter+4 digits) with examples"
    audio_asset: audio/data-01-06.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-DAT-014
      - FACT-DAT-015
      - FACT-DAT-016
      - FACT-DAT-017

  - scene_id: SCN-DATA-01-07
    tutorial_id: T-DATA-01
    order: 7
    scene_type: lesson
    screen_text: "In-network providers have pre-negotiated rates with your insurer, meaning lower costs for you. Out-of-network providers have no such contract — you pay significantly more. Electronic Health Records (EHRs) reduce duplicate tests and improve accuracy by making your data available digitally."
    visual_asset: images/data-network-ehr.png
    visual_type: excalidraw
    visual_prompt_hint: "Split diagram: Left side — in-network vs out-of-network cost comparison; Right side — EHR benefits (reduce duplicates, improve accuracy, digital access)"
    audio_asset: audio/data-01-07.mp3
    layout: split_screen
    aspect_ratio: "16:9"
    linked_facts:
      - FACT-DAT-018
      - FACT-DAT-019
      - FACT-DAT-020
      - FACT-DAT-021

  - scene_id: SCN-DATA-01-08
    tutorial_id: T-DATA-01
    order: 8
    scene_type: assessment
    screen_text: "Let's check your understanding of healthcare data and privacy."
    visual_asset: ""
    visual_type: ""
    visual_prompt_hint: ""
    audio_asset: audio/data-01-08.mp3
    layout: text_only
    aspect_ratio: "16:9"
