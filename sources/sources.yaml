  - source_id: SRC-CRS-002
    title: "Health Plan Eligibility Benefit Inquiry and Response"
    url: "https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/transactions/health-plan-eligibility-benefit-inquiry-response"
    domain: cross_domain
    key_points:
      - "The eligibility/benefit inquiry transaction (270) obtains information about an enrollee's benefit plan including eligibility and coverage"
      - "HHS adopted ASC X12N 270/271 Version 5010 as the standard for eligibility inquiry and response"
      - "As of January 1 2013 health plans must respond in real time to providers' eligibility questions"
      - "Real-time responses must include deductibles, co-pays, coinsurance amounts, and coverage information for specific service types"
      - "Inquiries can be sent from a provider to a health plan or from one health plan to another"
    regulatory_tags: [HIPAA, Eligibility, Administrative-Simplification]
    date_accessed: 2026-03-21

  - source_id: SRC-CRS-003
    title: "Are You a Covered Entity?"
    url: "https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/hipaa/covered-entities"
    domain: cross_domain
    key_points:
      - "HIPAA covered entities are health care clearinghouses, certain health care providers, and health plans"
      - "Health plans include health, dental, vision, prescription drug insurers, HMOs, Medicare, Medicaid, and employer-sponsored group health plans"
      - "Healthcare providers who transmit HIPAA transactions electronically are covered entities"
      - "Healthcare clearinghouses process nonstandard health information to conform to standards for data content or format on behalf of other organizations"
      - "Clearinghouses include billing services, repricing companies, community health management information systems, and value-added networks"
      - "Covered entities must establish written agreements with business associates to ensure HIPAA compliance"
    regulatory_tags: [HIPAA, Covered-Entities]
