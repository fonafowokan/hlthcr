  - source_id: SRC-CRS-001
    title: "Electronic Health Care Claims"
    url: "https://www.cms.gov/medicare/coding-billing/electronic-billing/electronic-healthcare-claims"
    domain: cross_domain
    key_points:
      - "Claims are electronically transmitted from providers to Medicare Administrative Contractors (MACs)"
      - "Initial HIPAA-standard edits determine if claims meet basic requirements; failures reject the entire batch"
      - "Automated edits check completeness, valid values, data consistency, business rules, duplicates, and provider/beneficiary eligibility"
      - "Claims passing initial edits are then checked against Medicare coverage and payment policy, which may result in rejection or denial"
      - "After successful transmission an acknowledgment report is generated and sent back to the submitter"
    regulatory_tags: [HIPAA, Claims]
