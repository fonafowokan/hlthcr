  - source_id: SRC-CRS-008
    title: "Summary of the HIPAA Privacy Rule"
    url: "https://www.hhs.gov/hipaa/for-professionals/privacy/laws-regulations/index.html"
    domain: cross_domain
    key_points:
      - "Protected health information (PHI) includes data relating to health condition, provision of health care, or payment for health care that identifies the individual"
      - "The Privacy Rule establishes national standards for protecting health information and gives individuals rights over their PHI"
      - "Covered entities may use and disclose PHI without individual authorization for treatment, payment, and health care operations"
      - "The minimum necessary standard requires covered entities to limit PHI disclosures to the minimum needed for the purpose"
      - "Individuals have the right to access, inspect, and obtain copies of their health records within 30 days of request"
      - "Individuals may request corrections to their health records and file complaints with HHS"
    regulatory_tags: [HIPAA, Privacy, PHI]
    date_accessed: 2026-03-21

