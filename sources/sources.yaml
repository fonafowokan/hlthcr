  - source_id: SRC-CRS-004
    title: "How to Read an Explanation of Benefits"
    url: "https://www.cms.gov/medical-bill-rights/help/guides/explanation-of-benefits"
    domain: cross_domain
    key_points:
      - "An EOB is a document received from a health plan after a provider visit showing total charges and how much each party owes"
      - "An EOB is not a bill"
      - "EOB includes Provider Charges (billed amount), Allowed Charges (what provider will actually be paid), Paid by Insurer, and What You Owe"
      - "Remark codes (2-3 character codes) provide explanations about costs and charges"
      - "Patients can use EOBs to track how they use their coverage and understand healthcare costs"
    regulatory_tags: [Claims, Patient-Rights]
    date_accessed: 2026-03-21

  - source_id: SRC-CRS-005
    title: "National Provider Identifier Standard (NPI)"
    url: "https://www.cms.gov/regulations-and-guidance/administrative-simplification/nationalprovidentstand"
    domain: cross_domain
    key_points:
      - "The NPI is a unique 10-digit identification number for covered health care providers required by HIPAA"
      - "The NPI is intelligence-free meaning it carries no information about provider state or specialty"
      - "Once assigned an NPI does not change even if the provider changes name or address"
      - "All HIPAA-covered providers whether individuals or organizations must obtain an NPI"
      - "All health plans and clearinghouses must use NPIs in HIPAA administrative and financial transactions"
      - "CMS developed the National Plan and Provider Enumeration System (NPPES) to assign NPIs"
    regulatory_tags: [HIPAA, NPI, Administrative-Simplification]
    date_accessed: 2026-03-21

  - source_id: SRC-CRS-006
    title: "Adopted Standards and Operating Rules"
    url: "https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/hipaa/adopted-standards-operating-rules"
    domain: cross_domain
    key_points:
      - "HIPAA mandates standard electronic transaction formats for the healthcare industry"
      - "837 (Version 5010) is the standard for submitting health care claims (institutional, professional, dental)"
      - "835 (Version 5010) is the standard for electronic remittance advice (claim payment information from payor to provider)"
      - "270/271 is the standard for eligibility inquiry and response"
      - "276/277 is the standard for claim status inquiry and response"
      - "278 is the standard for referral and prior authorization requests"
      - "834 is the standard for enrollment and disenrollment"
      - "820 is the standard for premium payments"
    regulatory_tags: [HIPAA, EDI, Administrative-Simplification]
