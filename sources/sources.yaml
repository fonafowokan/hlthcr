  - source_id: SRC-CRS-007
    title: "Overview of Coding and Classification Systems"
    url: "https://www.cms.gov/cms-guide-medical-technology-companies-and-other-interested-parties/coding/overview-coding-classification-systems"
    domain: cross_domain
    key_points:
      - "ICD-10-CM codes represent diagnoses and are used by all providers in every healthcare setting"
      - "CPT codes (HCPCS Level I) represent procedures and services and are maintained by the AMA"
      - "HCPCS Level II codes are established and maintained by CMS for products and supplies"
