    url: "https://www.cms.gov/cms-guide-medical-technology-companies-and-other-interested-parties/coding/overview-coding-classification-systems"
    domain: data
    key_points:
      - "HCPCS Level I consists of CPT codes — 5-digit numeric codes maintained by the AMA to identify medical services and procedures."
      - "HCPCS Level II codes identify products, supplies, and services not included in CPT, such as ambulance services and durable medical equipment."
      - "HCPCS Level II codes consist of one alphabetical letter followed by 4 numeric digits and are maintained by CMS."
      - "CPT covers six sections: Evaluation and Management, Anesthesiology, Surgery, Radiology, Pathology/Laboratory, and Medicine."
    regulatory_tags: [HCPCS, CPT]
