  - source_id: SRC-DAT-009
    title: "Health Insurance Plan & Network Types"
    url: "https://www.healthcare.gov/choose-a-plan/plan-types/"
    domain: data
    key_points:
      - "An in-network provider has a contract with a health insurer to provide services at agreed-upon rates, resulting in lower costs for the patient."
      - "An out-of-network provider does not have a contract with the insurer, so the patient pays more for services."
      - "Plan types such as HMOs, PPOs, and POS plans vary in how much they cover for out-of-network care."
    regulatory_tags: [Network, Insurance]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-010
    title: "Electronic Health Records"
    url: "https://www.cms.gov/priorities/key-initiatives/e-health/records"
    domain: data
    key_points:
      - "An EHR is an electronic version of a patient's medical history maintained by the provider over time."
      - "EHRs include demographics, progress notes, medications, vital signs, past medical history, immunizations, lab data, and radiology reports."
      - "EHRs reduce duplication of tests, reduce delays in treatment, and can improve accuracy of medical records."
      - "Certified EHR technology stores data in a structured format that allows providers to easily retrieve and transfer patient information."
    regulatory_tags: [EHR]
    date_accessed: 2026-03-21

