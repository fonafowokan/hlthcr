sources:
  - source_id: SRC-PRV-001
    title: "CMS Glossary – Health Care Provider"
    url: "https://www.cms.gov/glossary?items_per_page=10&term=provider&viewmode=grid"
    domain: provider
    key_points:
      - "A health care provider is a person who is trained and licensed to give health care, or a place that is licensed to give health care."
      - "Doctors, nurses, and hospitals are examples of health care providers."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-002
    title: "Become a Medicare Provider or Supplier"
    url: "https://www.cms.gov/medicare/enrollment-renewal/providers-suppliers"
    domain: provider
    key_points:
      - "Medicare distinguishes between providers (institutional care facilities like hospitals) and suppliers (entities furnishing diagnostic, therapeutic, or equipment services)."
      - "Enrollment requires three steps: obtain an NPI, complete a PECOS application, and engage with your regional MAC."
      - "Providers must report ownership changes and adverse legal actions within 30 days; all other changes within 90 days."
      - "PECOS applications process in approximately 30 days; paper applications in approximately 65 days."
    regulatory_tags: [Medicare, NPI, PECOS]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-003
    title: "CMS Enrollment Applications (CMS-855 Forms)"
    url: "https://www.cms.gov/medicare/enrollment-renewal/providers-suppliers/chain-ownership-system-pecos/enrollment-applications"
    domain: provider
    key_points:
      - "CMS-855A is for institutional providers (hospitals, SNFs, home health agencies, hospices)."
      - "CMS-855I is for individual physicians and non-physician practitioners."
      - "CMS-855B is for clinics, group practices, and certain other suppliers."
      - "CMS-855S is for DMEPOS suppliers."
      - "CMS-855O is for ordering and certifying physicians and non-physician practitioners."
    regulatory_tags: [Medicare, CMS-855]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-004
    title: "Enroll as a DMEPOS Supplier"
    url: "https://www.cms.gov/medicare/enrollment-renewal/providers-suppliers/durable-medical-equipment-prosthetics-orthotics-supplies-dmepos"
    domain: provider
    key_points:
      - "DME is equipment that can withstand repeated use, has an expected life of at least 3 years, serves a medical purpose, and is appropriate for home use."
      - "DMEPOS suppliers must obtain accreditation from a CMS-approved organization."
      - "A $50,000 surety bond is required for each NPI maintained with an enrollment contractor."
      - "Examples of DME include hospital beds, wheelchairs, ventilators, oxygen equipment, prosthetics, and orthotics."
    regulatory_tags: [Medicare, DMEPOS, Accreditation]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-005
    title: "Covered Entities and Business Associates"
    url: "https://www.hhs.gov/hipaa/for-professionals/covered-entities/index.html"
    domain: provider
    key_points:
      - "HIPAA covered entities include health care clearinghouses, health plans, and health care providers who conduct certain electronic transactions."
      - "Most doctors, clinics, hospitals, psychologists, chiropractors, nursing homes, pharmacies, and dentists are covered entities."
      - "Covered entities must comply with HIPAA Privacy and Security Rules to protect health information."
      - "Covered entities must have contracts with business associates ensuring proper use of health information."
      - "A covered provider with a direct treatment relationship must make a good faith effort to obtain written acknowledgement of privacy practices from patients."
    regulatory_tags: [HIPAA, Privacy Rule, Security Rule]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-006
    title: "Professional Paper Claim Form (CMS-1500)"
    url: "https://www.cms.gov/medicare/billing/electronicbillingeditrans/1500"
    domain: provider
    key_points:
      - "The CMS-1500 form is the standard claim form used by non-institutional providers and suppliers to bill Medicare."
      - "Providers should submit initial Medicare claims electronically unless they qualify for a waiver."
      - "The electronic equivalent is the ASC X12 837 Professional (837P) transaction."
    regulatory_tags: [Medicare, Claims, ASCA]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-007
    title: "Institutional Paper Claim Form (CMS-1450 / UB-04)"
    url: "https://www.cms.gov/medicare/coding-billing/electronic-billing/institutional-paper-claim-form"
    domain: provider
    key_points:
      - "The CMS-1450 form (also known as UB-04) is used by institutional providers (hospitals, SNFs, home health agencies) to bill Medicare."
      - "Institutional providers and non-institutional providers use different claim forms."
    regulatory_tags: [Medicare, Claims]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-008
    title: "Ambulance Services Coverage"
    url: "https://www.medicare.gov/coverage/ambulance-services"
    domain: provider
    key_points:
      - "Medicare covers ambulance services only when the patient's medical condition makes other transportation contraindicated."
      - "Emergency air ambulance (airplane or helicopter) is covered when immediate transport is needed and ground transportation cannot provide it."
      - "Non-emergency ambulance coverage is very limited and requires a written physician order."
      - "The ambulance fee schedule applies to volunteer, municipal, private, and independent ambulance suppliers as well as institutional providers."
    regulatory_tags: [Medicare, Ambulance]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-009
    title: "Medicaid Provider Enrollment Requirements Fact Sheet"
    url: "https://www.cms.gov/files/document/mpe-factsheet082616pdf"
    domain: provider
    key_points:
      - "States must have an agreement between the Medicaid agency and each provider furnishing services."
      - "States may impose additional provider enrollment requirements beyond federal minimums."
      - "State Medicaid Agencies must verify that providers have an unrestricted license."
      - "Medicaid enrollment application fees apply to institutional providers but not to individual physicians or group practices."
    regulatory_tags: [Medicaid, Enrollment]
    date_accessed: 2026-03-21

  - source_id: SRC-PRV-010
    title: "CMS Provider of Services File – Clinical Laboratories"
    url: "https://data.cms.gov/provider-characteristics/hospitals-and-other-facilities/provider-of-services-file-clinical-laboratories"
    domain: provider
    key_points:
      - "Clinical laboratories exist in many facility types including hospitals, ambulatory surgery centers, physician offices, pharmacies, and independent labs."
      - "Ancillary services such as laboratory tests in hospital settings are generally packaged into facility payments rather than paid separately."
    regulatory_tags: [CLIA, Medicare]
    date_accessed: 2026-03-21

  # ── Patient Sources ─────────────────────────────────────────────

  - source_id: SRC-PAT-001
    title: "Glossary of Health Coverage and Medical Terms (Uniform Glossary)"
    url: "https://www.cms.gov/CCIIO/Resources/Forms-Reports-and-Other-Resources/Downloads/Uniform-Glossary-01-2020.pdf"
    domain: patient
    key_points:
      - "A subscriber is the primary individual who enrolls in and holds the insurance plan contract with the carrier."
      - "A dependent is a family member (spouse, child, domestic partner) covered under the subscriber's insurance plan."
      - "Dependent coverage is insurance protection extending to eligible family members beyond the primary subscriber."
      - "A premium is the regular payment required to maintain active insurance coverage."
      - "A deductible is the set amount an insured individual must pay before the plan begins sharing costs for covered services."
      - "A copayment is a fixed dollar amount the patient pays at the point of service."
      - "Coinsurance is the percentage of costs shared between the insurer and patient after the deductible is satisfied."
      - "The out-of-pocket limit is the maximum annual amount an individual pays before insurance covers remaining eligible expenses at 100%."
      - "A claim is a formal request submitted to the insurance company for payment of covered healthcare services."
      - "An Explanation of Benefits (EOB) is a document detailing claim processing results, showing services covered, amounts paid, and patient responsibility."
    regulatory_tags: [ACA]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-002
    title: "Dependent – HealthCare.gov Glossary"
    url: "https://www.healthcare.gov/glossary/dependent/"
    domain: patient
    key_points:
      - "A dependent is a child or other individual for whom a parent, relative, or other person may claim a personal exemption tax deduction."
      - "Under the ACA, dependents can be included on a Marketplace application if they will be claimed as tax dependents."
    regulatory_tags: [ACA]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-003
    title: "Coverage for Young Adults"
    url: "https://www.cms.gov/marketplace/private-health-insurance/coverage-young-adults"
    domain: patient
    key_points:
      - "The ACA requires health plans that offer dependent coverage to make it available until the child reaches age 26."
      - "Both married and unmarried children qualify for dependent coverage under 26."
      - "Starting in 2014, children can stay on a parent's employer plan even if they have access to employer coverage elsewhere."
    regulatory_tags: [ACA]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-004
    title: "Your Rights Under HIPAA"
    url: "https://www.hhs.gov/hipaa/for-individuals/guidance-materials-for-consumers/index.html"
    domain: patient
    key_points:
      - "Patients have the right to ask to see or get a copy of their health and claims records."
      - "Covered entities must usually provide records within 30 days of the request."
      - "Patients have the right to request corrections to their health records."
      - "Patients have the right to be notified of a breach of their unsecured health information."
      - "Patients have the right to file a complaint with HHS if they believe their privacy rights have been violated."
    regulatory_tags: [HIPAA, Privacy Rule]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-005
    title: "Individuals' Right under HIPAA to Access their Health Information"
    url: "https://www.hhs.gov/hipaa/for-professionals/privacy/guidance/access/index.html"
    domain: patient
    key_points:
      - "The HIPAA Privacy Rule gives individuals a legal, enforceable right to see and receive copies of their health information."
      - "Designated record sets include medical records, billing records, payment and claims records, and health plan enrollment records."
      - "Individuals can direct a covered entity to transmit a copy of their PHI to a designated person or entity of their choice."
      - "A provider may charge reasonable costs for copying and mailing records but cannot charge for searching or retrieving them."
      - "Covered entities must respond to access requests within 30 days."
    regulatory_tags: [HIPAA, Privacy Rule]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-006
    title: "Summary of the HIPAA Privacy Rule"
    url: "https://www.hhs.gov/hipaa/for-professionals/privacy/laws-regulations/index.html"
    domain: patient
    key_points:
      - "Protected health information (PHI) is individually identifiable health information relating to past, present, or future physical or mental health, provision of care, or payment for care."
      - "The Privacy Rule applies to health plans, health care clearinghouses, and health care providers who conduct certain electronic transactions."
      - "The Rule requires appropriate safeguards to protect the privacy of PHI and sets limits on uses and disclosures without individual authorization."
      - "Individual rights include the right to access, right to request amendment, right to an accounting of disclosures, and right to request restrictions."
    regulatory_tags: [HIPAA, Privacy Rule]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-007
    title: "Getting Health Coverage Outside Open Enrollment"
    url: "https://www.healthcare.gov/coverage-outside-open-enrollment/special-enrollment-period/"
    domain: patient
    key_points:
      - "Open Enrollment is the annual period when anyone can enroll in or change a Marketplace health plan."
      - "A Special Enrollment Period (SEP) allows enrollment outside Open Enrollment based on qualifying life events."
      - "Qualifying life events include losing health coverage, moving, getting married, having a baby, or adopting a child."
      - "Most SEPs give you 60 days before or after the qualifying event to enroll in a plan."
    regulatory_tags: [ACA, Marketplace]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-008
    title: "Your Total Costs for Health Care: Premium, Deductible, and Out-of-Pocket Costs"
    url: "https://www.healthcare.gov/choose-a-plan/your-total-costs/"
    domain: patient
    key_points:
      - "A premium is the amount you pay each month to maintain your health insurance coverage."
      - "The deductible is the amount you spend for covered services before your plan pays anything, except for free preventive services."
      - "After you meet your deductible, you typically pay coinsurance or a copay for covered services."
      - "The out-of-pocket maximum is the most you spend for covered services in a year; after reaching it the plan pays 100%."
    regulatory_tags: [ACA]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-009
    title: "Health Insurance Terms You Should Know"
    url: "https://www.cms.gov/medical-bill-rights/help/guides/health-insurance-terms"
    domain: patient
    key_points:
      - "Cost sharing is the patient's share of costs for plan-covered services that must be paid out of pocket."
      - "In-network providers have a contract with the health plan to provide services at certain costs."
      - "Out-of-network providers do not have a contract with the plan and typically result in higher out-of-pocket costs."
      - "The allowed amount is the maximum payment the plan will pay for a covered service."
      - "Balance billing is when a provider bills the patient for the remaining balance the plan does not cover."
    regulatory_tags: [No Surprises Act]
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-010
    title: "Informed Consent – StatPearls (NCBI Bookshelf)"
    url: "https://www.ncbi.nlm.nih.gov/books/NBK430827/"
    domain: patient
    key_points:
      - "Informed consent is a communication process in which a clinician educates a patient about the risks, benefits, and alternatives of a procedure or intervention."
      - "Key elements include the nature of the procedure, risks and benefits, reasonable alternatives, and an assessment of patient understanding."
      - "Competent adults provide their own consent; parents or guardians consent for children."
      - "Exceptions to informed consent include life-threatening emergencies with insufficient time and patient incapacity with no available decision-maker."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-011
    title: "Patient Engagement – CDC Health Literacy"
    url: "https://www.cdc.gov/health-literacy/php/research-summaries/patient-engagement.html"
    domain: patient
    key_points:
      - "Patient activation is the knowledge, skills, and confidence to become actively engaged in one's health care."
      - "Higher patient activation is associated with improved health outcomes and lower costs."
      - "Key engagement strategies include self-management support, shared decision-making, and health information systems."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-012
    title: "How to Read an Explanation of Benefits"
    url: "https://www.cms.gov/medical-bill-rights/help/guides/explanation-of-benefits"
    domain: patient
    key_points:
      - "An EOB shows the costs of care, including services received, dates, amount the plan pays, and the amount the patient owes."
      - "Patients should compare their EOB with the provider's bill to verify that services and amounts match."
      - "Patients should only pay after receiving a bill from the provider and confirming it matches the EOB."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAT-013
    title: "Notice of Privacy Practices"
    url: "https://www.hhs.gov/hipaa/for-individuals/notice-privacy-practices/index.html"
    domain: patient
    key_points:
      - "The HIPAA Privacy Rule requires covered entities to provide a Notice of Privacy Practices in plain language."
      - "The notice must describe how the entity may use and disclose protected health information."
      - "Health care providers with direct treatment relationships must give the notice no later than the date of first service."
      - "The provider must make a good faith effort to obtain written acknowledgment of receipt of the notice."
    regulatory_tags: [HIPAA, Privacy Rule]
    date_accessed: 2026-03-21

  # ── Payor Sources ────────────────────────────────────────────────

