    url: "https://www.medicare.gov/basics/get-started-with-medicare/medicare-basics/parts-of-medicare"
    domain: payor
    key_points:
      - "Medicare Part A covers inpatient hospital stays, skilled nursing facility care, hospice care, and some home health services."
      - "Medicare Part B covers doctors' services, outpatient care, durable medical equipment, and preventive services."
      - "Medicare serves people age 65 and older and some people under 65 with certain disabilities or conditions."
      - "Original Medicare consists of Part A and Part B together."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-002
    title: "Original Medicare (Part A and B) Eligibility and Enrollment"
    url: "https://www.cms.gov/medicare/enrollment-renewal/original-part-a-b"
    domain: payor
    key_points:
      - "People are eligible for Medicare when they turn 65."
      - "People already receiving Social Security are automatically enrolled in Part A and Part B."
      - "Medicare is also available to people under 65 with disabilities, ESRD, or ALS."
      - "Medicare is administered by the Centers for Medicare & Medicaid Services (CMS), a federal agency under HHS."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-003
    title: "2026 Medicare Parts A & B Premiums and Deductibles"
    url: "https://www.cms.gov/newsroom/fact-sheets/2026-medicare-parts-b-premiums-deductibles"
    domain: payor
    key_points:
      - "Most people do not pay a premium for Part A if they have 40 or more quarters of Medicare-covered employment."
      - "The 2026 standard monthly premium for Part B is $202.90."
      - "The 2026 annual deductible for Part B is $283."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-004
    title: "Medicaid"
    url: "https://www.medicaid.gov/medicaid"
    domain: payor
    key_points:
      - "Medicaid provides health coverage to eligible low-income adults, children, pregnant women, elderly adults, and people with disabilities."
      - "Medicaid is funded jointly by states and the federal government."
      - "Medicaid is administered by states according to federal requirements."
      - "Medicaid covered 68.8 million people as of November 2025."
      - "The federal share of costs is determined by the Federal Medical Assistance Percentage (FMAP), which varies by state."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-005
    title: "Types of health insurance"
    url: "https://www.cms.gov/medical-bill-rights/help/guides/what-type-of-insurance"
    domain: payor
    key_points:
      - "Health insurance falls into three broad categories: employer-sponsored, individual/marketplace, and government programs."
      - "Private employer plans offer group health coverage to employees."
      - "Individual plans can be purchased through the Health Insurance Marketplace or directly from insurers."
      - "Government programs include Medicare, Medicaid/CHIP, and TRICARE."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-006
    title: "Health insurance plan & network types: HMOs, PPOs, and more"
    url: "https://www.healthcare.gov/choose-a-plan/plan-types/"
    domain: payor
    key_points:
      - "Common commercial plan types include HMO, PPO, EPO, and POS."
      - "The majority of people in the U.S. have private (commercial) health insurance."
    regulatory_tags: []
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-007
    title: "Covered Entities and Business Associates"
    url: "https://www.hhs.gov/hipaa/for-professionals/covered-entities/index.html"
    domain: payor
    key_points:
      - "Health plans are one of the three types of HIPAA covered entities, alongside health care providers and clearinghouses."
      - "Covered health plans include health insurance companies, HMOs, employer-sponsored health plans, and government programs like Medicare and Medicaid."
      - "A group health plan with fewer than 50 participants administered solely by the employer is not a HIPAA covered entity."
      - "Covered entities must comply with HIPAA Privacy and Security Rules to protect health information."
    regulatory_tags: [HIPAA]
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-008
    title: "Are You a Covered Entity?"
    url: "https://www.cms.gov/priorities/key-initiatives/burden-reduction/administrative-simplification/hipaa/covered-entities"
    domain: payor
    key_points:
      - "HIPAA covered entities include health plans, healthcare providers who transmit electronically, and clearinghouses."
      - "Health plans subject to HIPAA include health insurance companies, HMOs, employer-sponsored plans, Medicare, Medicaid, and military/veterans programs."
      - "Business associates that handle PHI on behalf of covered entities must have written HIPAA agreements."
    regulatory_tags: [HIPAA]
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-009
    title: "Know your rights without insurance"
    url: "https://www.cms.gov/medical-bill-rights/know-your-rights/no-insurance"
    domain: payor
    key_points:
      - "Self-pay patients are those who do not have insurance or choose not to use their insurance for a given service."
      - "An uninsured individual is not enrolled in any group health plan, individual health insurance, or federal health care program."
      - "The No Surprises Act requires providers to give uninsured or self-pay patients a good faith estimate of expected charges."
    regulatory_tags: [No Surprises Act]
    date_accessed: 2026-03-21

  - source_id: SRC-PAY-010
    title: "Medicare Secondary Payer"
    url: "https://www.cms.gov/medicare/coordination-benefits-recovery/overview/secondary-payer"
    domain: payor
    key_points:
      - "A payer is an entity responsible for paying healthcare providers, including private insurers and government programs."
      - "When a patient has multiple payers, coordination of benefits rules determine which payer pays first (primary payer)."
    regulatory_tags: []
    date_accessed: 2026-03-21

  # ── Healthcare Data Sources ──────────────────────────────────────

  - source_id: SRC-DAT-001
    title: "What is PHI?"
    url: "https://www.hhs.gov/answers/hipaa/what-is-phi/index.html"
    domain: data
    key_points:
      - "PHI is individually identifiable health information held or transmitted by a covered entity or its business associate, in any form or medium."
      - "PHI relates to an individual's past, present, or future physical or mental health or condition, the provision of health care, or payment for health care."
      - "PHI includes common identifiers such as name, address, birth date, and Social Security Number when associated with health information."
      - "PHI is protected whether it is in electronic, paper, or oral form."
    regulatory_tags: [HIPAA, PHI]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-002
    title: "Summary of the HIPAA Privacy Rule"
    url: "https://www.hhs.gov/hipaa/for-professionals/privacy/laws-regulations/index.html"
    domain: data
    key_points:
      - "The Privacy Rule protects all individually identifiable health information held or transmitted by a covered entity or its business associate."
      - "Covered entities are health plans, health care clearinghouses, and health care providers who conduct certain electronic transactions."
      - "The minimum necessary standard requires covered entities to make reasonable efforts to limit use and disclosure of PHI to the minimum necessary to accomplish the intended purpose."
      - "Disclosures for treatment purposes between health care providers are exempt from the minimum necessary requirement."
      - "Individuals have rights to access, inspect, and obtain a copy of their PHI."
    regulatory_tags: [HIPAA, Privacy Rule, PHI]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-003
    title: "Summary of the HIPAA Security Rule"
    url: "https://www.hhs.gov/hipaa/for-professionals/security/laws-regulations/index.html"
    domain: data
    key_points:
      - "The Security Rule establishes national standards to protect electronic protected health information (ePHI)."
      - "The Security Rule applies to covered entities and their business associates."
      - "The Security Rule requires three categories of safeguards: administrative, physical, and technical."
      - "Administrative safeguards are organizational policies and procedures to manage the security program."
      - "Physical safeguards protect electronic systems, buildings, and equipment from unauthorized access and hazards."
      - "Technical safeguards are technology-based measures to protect ePHI and control access."
      - "The Security Rule aims to ensure the confidentiality, integrity, and availability of ePHI."
    regulatory_tags: [HIPAA, Security Rule, ePHI]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-004
    title: "Breach Notification Rule"
    url: "https://www.hhs.gov/hipaa/for-professionals/breach-notification/index.html"
    domain: data
    key_points:
      - "Covered entities must notify affected individuals of a breach of unsecured PHI without unreasonable delay and no later than 60 days after discovery."
      - "Breaches affecting more than 500 residents of a state or jurisdiction require notification to prominent media outlets within 60 days."
      - "Covered entities must notify the HHS Secretary of all breaches; breaches affecting 500 or more individuals are reported immediately, while smaller breaches are reported annually."
      - "Business associates must notify the covered entity of a breach within 60 days of discovery."
    regulatory_tags: [HIPAA, Breach Notification]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-005
    title: "Covered Entities and Business Associates"
    url: "https://www.hhs.gov/hipaa/for-professionals/covered-entities/index.html"
    domain: data
    key_points:
      - "HIPAA covered entities are health care clearinghouses, health plans, and health care providers who transmit health information electronically."
      - "Health plans include health, dental, vision, and prescription drug insurers, HMOs, Medicare, Medicaid, and employer-sponsored group health plans."
      - "Health care clearinghouses process nonstandard health information into standard formats or vice versa."
      - "A business associate performs functions involving PHI on behalf of a covered entity and must have a written agreement to comply with HIPAA rules."
    regulatory_tags: [HIPAA, Covered Entities, Business Associates]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-006
    title: "ICD-10"
    url: "https://www.cms.gov/medicare/coding-billing/icd-10-codes"
    domain: data
    key_points:
      - "ICD-10-CM (Clinical Modification) is used by all providers in every healthcare setting for coding diagnoses."
      - "ICD-10-PCS (Procedure Coding System) is used for coding inpatient hospital procedures."
      - "The U.S. transitioned from ICD-9 to ICD-10 on October 1, 2015."
      - "ICD-10 applies to all HIPAA-covered entities, not just Medicare or Medicaid providers."
    regulatory_tags: [ICD-10, HIPAA]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-007
    title: "Transitioning to ICD-10"
    url: "https://www.cms.gov/newsroom/fact-sheets/transitioning-icd-10"
    domain: data
    key_points:
      - "ICD-9-CM had approximately 14,000 diagnosis codes; ICD-10-CM has approximately 69,000 diagnosis codes."
      - "ICD-10 provides greater specificity in identifying health conditions with codes up to 7 characters long."
      - "ICD-9 code categories were full and the structure limited the creation of new codes."
      - "ICD-10 terminology is more consistent with current medical practice and technology."
    regulatory_tags: [ICD-9, ICD-10]
    date_accessed: 2026-03-21

  - source_id: SRC-DAT-008
